<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Storybook">
<meta name="theme-color" content="#1a1a1a">
<title>Storybook</title>

<!-- Export libraries (loaded only when needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>

<style>
  :root {
    --bg: #1a1a1a;
    --panel: #242424;
    --panel-2: #2e2e2e;
    --ink: #f2f2ee;
    --ink-dim: #8a8a86;
    --ink-faint: #5a5a56;
    --paper: #f6f3eb;
    --paper-shadow: rgba(0,0,0,.35);
    --gutter: rgba(80,80,76,.55);
    --hairline: rgba(255,255,255,.08);
    --danger: #d97757;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  input { font: inherit; color: inherit; }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }
  .hidden { display: none !important; }

  /* ---------- Common bars ---------- */
  .bar {
    display: flex; align-items: center; gap: 14px;
    background: rgba(36,36,36,.85); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--hairline);
    color: var(--ink);
    font-size: 12px; letter-spacing: .04em;
  }
  .icon-btn {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border-radius: 50%;
    color: var(--ink-dim);
    transition: color .15s, background .15s;
  }
  .icon-btn:active { color: var(--ink); }
  .icon-btn.disabled { color: var(--ink-faint); pointer-events: none; }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ---------- Projects view ---------- */
  .projects {
    flex: 1; overflow-y: auto;
    padding: max(48px, env(safe-area-inset-top)) 32px max(40px, env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }
  .projects-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 36px;
  }
  .projects-title {
    font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  .new-btn {
    background: var(--ink); color: var(--bg);
    padding: 10px 20px; border-radius: 999px;
    font-size: 13px; font-weight: 500; letter-spacing: .03em;
  }
  .link-btn {
    color: var(--ink-dim); font-size: 13px;
    padding: 8px 14px; border-radius: 999px;
    border: 1px solid var(--hairline);
  }
  .link-btn:hover { color: var(--ink); background: var(--panel); }
  .project-grid {
    display: grid; gap: 32px 24px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }
  .project-card {
    display: flex; flex-direction: column; gap: 10px;
    text-align: left;
  }
  .project-cover {
    aspect-ratio: 1;
    background: var(--paper);
    border-radius: 2px;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
    overflow: hidden;
    display: grid; place-items: center;
    position: relative;
    transition: transform .15s;
  }
  .project-cover:active { transform: scale(.98); }
  .project-cover img { width: 100%; height: 100%; object-fit: contain; }
  .project-cover.empty::after {
    content: ''; width: 30%; height: 30%;
    border: 1px dashed var(--ink-faint);
    border-radius: 4px;
  }
  .project-meta {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 8px; padding: 0 4px;
  }
  .project-name {
    font-size: 14px; color: var(--ink);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    flex: 1;
  }
  .project-sub {
    font-size: 11px; letter-spacing: .04em;
    color: var(--ink-dim);
    padding: 0 4px;
  }
  .project-menu-btn {
    width: 24px; height: 24px;
    display: grid; place-items: center;
    color: var(--ink-dim);
    border-radius: 50%;
  }
  .project-menu-btn:active { background: var(--panel); color: var(--ink); }
  .empty-state {
    grid-column: 1 / -1;
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 24px; gap: 16px;
    color: var(--ink-dim);
  }
  .empty-state .big-new-btn {
    margin-top: 12px;
    background: var(--ink); color: var(--bg);
    padding: 14px 32px; border-radius: 999px;
    font-size: 14px; font-weight: 500;
  }

  /* ---------- Setup view ---------- */
  .setup {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    gap: 36px;
  }
  .setup-back {
    position: absolute; top: max(20px, env(safe-area-inset-top)); left: 24px;
    color: var(--ink-dim); font-size: 13px; padding: 8px 12px;
  }
  .setup-back:active { color: var(--ink); }
  .setup h1 {
    font-size: 22px; font-weight: 500; letter-spacing: .02em;
    margin: 0; color: var(--ink);
  }
  .setup .sub {
    color: var(--ink-dim); font-size: 13px; margin-top: -28px;
    letter-spacing: .03em;
  }
  .setup-section {
    width: min(560px, 100%);
    display: flex; flex-direction: column; gap: 14px;
  }
  .setup-label {
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  .size-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .size-card {
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 14px; padding: 18px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    transition: border-color .15s, background .15s;
  }
  .size-card.active { border-color: var(--ink); background: var(--panel-2); }
  .size-card .preview {
    background: var(--paper); border-radius: 2px;
    box-shadow: 0 2px 8px var(--paper-shadow);
  }
  .size-card .name { font-size: 12px; color: var(--ink); }
  .count-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .count-pill {
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 999px; padding: 10px 18px;
    font-size: 13px; min-width: 60px; text-align: center;
    transition: border-color .15s, background .15s;
  }
  .count-pill.active { border-color: var(--ink); background: var(--panel-2); }
  .start-btn {
    margin-top: 8px;
    background: var(--ink); color: var(--bg);
    padding: 14px 32px; border-radius: 999px;
    font-size: 14px; font-weight: 500; letter-spacing: .04em;
  }

  /* ---------- Draw view ---------- */
  .draw { flex: 1; position: relative; display: flex; flex-direction: column; }
  .topbar {
    position: absolute; top: max(12px, env(safe-area-inset-top));
    left: 50%; transform: translateX(-50%);
    z-index: 20;
  }
  .page-counter {
    min-width: 78px; text-align: center;
    font-variant-numeric: tabular-nums;
    color: var(--ink); font-size: 13px;
    letter-spacing: .06em;
  }
  .page-counter .label { color: var(--ink-dim); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; display: block; }

  .canvas-stage {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 80px 24px 130px;
    position: relative;
    overflow: hidden;
  }
  .page-frame {
    position: relative;
    background: var(--paper);
    box-shadow: 0 12px 40px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.04);
    border-radius: 1px;
    touch-action: none;
    overflow: hidden;
    transition: transform .25s ease, opacity .25s ease;
  }
  .page-frame.flip-out-left  { transform: translateX(-30%); opacity: 0; }
  .page-frame.flip-out-right { transform: translateX(30%);  opacity: 0; }
  .zoom-container {
    position: absolute; inset: 0;
    transform-origin: 50% 50%;
  }
  .page-frame canvas {
    display: block; width: 100%; height: 100%;
    touch-action: none;
  }
  /* Gutter: dashed centerline overlay for spreads */
  .gutter-line {
    position: absolute; top: 0; bottom: 0;
    left: 50%; width: 0;
    border-left: 1px dashed var(--gutter);
    pointer-events: none;
  }

  .toolbar {
    position: absolute; bottom: max(20px, env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    background: rgba(36,36,36,.9); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 8px; border-radius: 999px;
    border: 1px solid var(--hairline);
    z-index: 20;
    max-width: calc(100vw - 24px);
    overflow-x: auto;
  }
  .toolbar::-webkit-scrollbar { display: none; }
  .tool-btn {
    width: 38px; height: 38px;
    display: grid; place-items: center;
    border-radius: 50%;
    color: var(--ink-dim);
    flex-shrink: 0;
    transition: background .15s, color .15s;
  }
  .tool-btn.active { background: var(--ink); color: var(--bg); }
  .tool-btn svg { width: 19px; height: 19px; }
  .divider {
    width: 1px; height: 22px; background: var(--hairline); margin: 0 4px; flex-shrink: 0;
  }
  .swatch {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid var(--hairline);
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: transform .12s;
  }
  .swatch.active { transform: scale(1.18); border-color: var(--ink); }
  .swatch .dot { width: 16px; height: 16px; border-radius: 50%; }
  .slider-cluster {
    display: flex; align-items: center; gap: 6px; padding: 0 4px;
    flex-shrink: 0;
  }
  .slider-cluster .readout {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--panel-2);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .slider-cluster .readout .dot { background: var(--ink); border-radius: 50%; }
  .slider {
    -webkit-appearance: none; appearance: none;
    width: 70px; height: 4px; border-radius: 2px;
    background: var(--panel-2);
    outline: none; flex-shrink: 0;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--ink); cursor: pointer;
  }
  .slider-label {
    font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--ink-faint);
    width: 22px; text-align: center;
    flex-shrink: 0;
  }

  /* Project menu (top-right of draw view) */
  .top-right {
    position: absolute; top: max(12px, env(safe-area-inset-top));
    right: max(16px, env(safe-area-inset-right));
    display: flex; gap: 6px; z-index: 20;
  }
  .top-left {
    position: absolute; top: max(12px, env(safe-area-inset-top));
    left: max(16px, env(safe-area-inset-left));
    display: flex; gap: 6px; z-index: 20;
  }
  .top-right .icon-btn, .top-left .icon-btn {
    background: rgba(36,36,36,.85); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--hairline);
  }
  .bottom-left {
    position: absolute;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: max(16px, env(safe-area-inset-left));
    z-index: 20;
  }

  /* Popover menu */
  .popover {
    position: absolute; z-index: 60;
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 14px; padding: 6px;
    min-width: 200px;
    box-shadow: 0 10px 40px rgba(0,0,0,.55);
  }
  .popover button {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 12px; border-radius: 8px;
    color: var(--ink); font-size: 13px; text-align: left;
  }
  .popover button:hover { background: var(--panel-2); }
  .popover button.danger { color: var(--danger); }
  .popover button svg { width: 15px; height: 15px; opacity: .8; }
  .popover .sep { height: 1px; background: var(--hairline); margin: 4px 0; }

  /* ---------- Thumbnails view ---------- */
  .thumbs {
    flex: 1; overflow-y: auto;
    padding: max(64px, env(safe-area-inset-top)) 24px max(40px, env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
  }
  .thumbs-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px;
  }
  .thumbs-title { display: flex; gap: 10px; align-items: baseline; }
  #thumbs-title-name {
    font-size: 18px; color: var(--ink); font-weight: 500;
    padding: 2px 4px; border-radius: 4px;
    cursor: text;
    outline: none;
    border: 1px solid transparent;
    min-width: 60px;
  }
  #thumbs-title-name:hover { background: var(--panel); }
  #thumbs-title-name[contenteditable="true"] { border-color: var(--ink-dim); background: var(--panel); }
  #thumbs-title-meta {
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  .thumbs-back {
    font-size: 12px; letter-spacing: .04em; color: var(--ink-dim);
    padding: 4px 0; margin-bottom: 6px;
  }
  .thumbs-back:hover, .thumbs-back:active { color: var(--ink); }
  .thumbs-actions { display: flex; gap: 12px; align-items: center; }
  .thumbs-actions button {
    color: var(--ink-dim); font-size: 13px;
    padding: 4px 10px; border-radius: 999px;
  }
  .thumbs-actions button:hover { background: var(--panel); color: var(--ink); }
  .thumbs-actions button:active { color: var(--ink); }
  .thumb-grid {
    display: grid; gap: 28px 16px;
  }
  .thumb {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    background: none; text-align: center;
    cursor: default;
  }
  .thumb-img { cursor: default; }
  .thumb-img {
    width: 100%;
    background: var(--paper);
    border-radius: 2px;
    box-shadow: 0 4px 14px rgba(0,0,0,.3);
    overflow: hidden;
    display: flex; position: relative;
    transition: transform .15s;
  }
  .thumb-img.active-view { outline: 2px solid var(--ink); outline-offset: 4px; }
  .thumb-img:active { transform: scale(.97); }
  .thumb-img img, .thumb-img canvas {
    width: 100%; height: 100%; object-fit: contain; display: block;
    flex: 1;
    /* Make thumb images and the swapped-in drawing canvas event-transparent
     * so the parent cell receives pointer events. Without this, dragging on
     * a populated thumb starts the browser's native image-drag instead, which
     * suppresses pointermove and breaks drag-to-draw. The cell uses pointer
     * capture, so events still flow correctly during a drawing stroke. */
    pointer-events: none;
    -webkit-user-drag: none;
    user-select: none;
  }
  .thumb-img.is-spread > .gutter-line { display: block; }
  .thumb-num {
    font-size: 10px; color: var(--ink-dim);
    font-variant-numeric: tabular-nums; letter-spacing: .1em;
    text-transform: uppercase;
  }

  /* ---------- Lasso ---------- */
  .lasso-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  .lasso-path {
    fill: rgba(255,255,255,.08);
    stroke: rgba(0,0,0,.85);
    stroke-width: 2;
    stroke-dasharray: 8 4;
    vector-effect: non-scaling-stroke;
  }
  .selection-overlay {
    position: absolute;
    display: none;
    transform-origin: 50% 50%;
    border: 1px dashed rgba(0,0,0,.7);
    box-sizing: border-box;
    pointer-events: auto;
    cursor: move;
    touch-action: none;
  }
  .selection-overlay.active { display: block; }
  .sel-canvas {
    display: block;
    width: 100%; height: 100%;
  }
  .sel-handle {
    position: absolute;
    width: 14px; height: 14px;
    background: var(--ink);
    border: 1px solid var(--bg);
    border-radius: 50%;
    pointer-events: auto;
    touch-action: none;
  }
  .h-tl { top: -7px; left: -7px;   cursor: nwse-resize; }
  .h-tr { top: -7px; right: -7px;  cursor: nesw-resize; }
  .h-bl { bottom: -7px; left: -7px;  cursor: nesw-resize; }
  .h-br { bottom: -7px; right: -7px; cursor: nwse-resize; }
  .h-rot {
    top: -34px; left: 50%;
    transform: translateX(-50%);
    cursor: grab;
    background: var(--ink);
  }
  .h-rot::after {
    content: ''; position: absolute;
    top: 14px; left: 50%; transform: translateX(-50%);
    width: 1px; height: 20px;
    background: rgba(0,0,0,.6);
  }

  /* ---------- Lasso actions toolbar ---------- */
  .lasso-toolbar {
    position: absolute;
    bottom: max(78px, calc(env(safe-area-inset-bottom) + 60px));
    left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
    background: rgba(36,36,36,.95); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 6px; border-radius: 999px;
    border: 1px solid var(--hairline);
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
    z-index: 21;
    pointer-events: auto;
  }
  .lasso-toolbar.hidden { display: none; }
  .lasso-toolbar button {
    padding: 8px 14px; border-radius: 999px;
    color: var(--ink); font-size: 13px;
    letter-spacing: .03em;
  }
  .lasso-toolbar button:hover:not(:disabled) { background: var(--panel-2); }
  .lasso-toolbar button:disabled { color: var(--ink-faint); cursor: default; }
  .lasso-toolbar button.danger { color: var(--danger); }
  .lasso-toolbar .lt-divider { width: 1px; background: var(--hairline); margin: 0 2px; }

  /* ---------- Text boxes ---------- */
  .textbox-layer {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .textbox-layer.text-active { pointer-events: auto; }
  .textbox {
    position: absolute;
    box-sizing: border-box;
    background: transparent;
    border: 1px dashed transparent;
    pointer-events: auto;
    cursor: default;
  }
  .textbox-layer.text-active .textbox { border-color: rgba(80,80,76,.35); }
  .textbox.selected { border: 1px solid rgba(0,0,0,.6); }
  .textbox.editing {
    outline: 2px solid var(--ink);
    border: 1px solid rgba(0,0,0,.6);
  }
  .textbox-input {
    display: block;
    width: 100%; height: 100%;
    box-sizing: border-box;
    padding: 4px 6px;
    margin: 0;
    background: transparent;
    border: 0;
    color: #1a1a1a;
    font: inherit;
    font-family: "Courier New", "Courier", ui-monospace, monospace;
    line-height: 1.3;
    text-align: inherit;
    resize: none;
    outline: none;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    pointer-events: none;
    cursor: default;
  }
  .textbox-input:not([readonly]) {
    -webkit-user-select: text; user-select: text;
    pointer-events: auto;
    cursor: text;
  }
  .textbox-input::placeholder {
    color: rgba(80,80,76,.6);
  }
  .resize-handle {
    position: absolute;
    right: -7px; bottom: -7px;
    width: 14px; height: 14px;
    background: var(--ink);
    border: 1px solid var(--bg);
    border-radius: 50%;
    cursor: nwse-resize;
    display: none;
    pointer-events: auto;
    touch-action: none;
  }
  .textbox.selected .resize-handle,
  .textbox.editing .resize-handle { display: block; }

  /* Floating text formatting toolbar */
  .text-toolbar {
    position: absolute;
    z-index: 6;
    display: flex; align-items: center; gap: 4px;
    background: rgba(36,36,36,.95); backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 6px; border-radius: 999px;
    border: 1px solid var(--hairline);
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
  }
  .text-toolbar .tt-btn {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border-radius: 50%;
    color: var(--ink-dim);
    font-size: 13px;
  }
  .text-toolbar .tt-btn:active,
  .text-toolbar .tt-btn.active { background: var(--ink); color: var(--bg); }
  .text-toolbar .tt-btn svg { width: 16px; height: 16px; }
  .text-toolbar .tt-btn.danger { color: var(--danger); }
  .text-toolbar .tt-divider {
    width: 1px; height: 18px; background: var(--hairline); margin: 0 4px;
  }
  .text-toolbar .tt-size {
    min-width: 36px; text-align: center;
    color: var(--ink); font-variant-numeric: tabular-nums;
    font-size: 12px;
  }

  /* ---------- Modal ---------- */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    display: grid; place-items: center; z-index: 70;
    padding: 24px;
  }
  .modal {
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 18px; padding: 24px;
    max-width: 380px; width: 100%;
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal h2 { margin: 0; font-size: 16px; font-weight: 500; }
  .modal p { margin: 0; color: var(--ink-dim); font-size: 13px; }
  .modal input[type="text"] {
    background: var(--bg); border: 1px solid var(--hairline);
    border-radius: 10px; padding: 10px 12px;
    color: var(--ink); font-size: 14px;
    outline: none;
  }

<script>
'use strict';

/* ============================================================
 * Constants
 * ============================================================ */
const PAGE_SIZES = [
  { id: 'square',    label: 'Square',    w: 1500, h: 1500 },
  { id: 'landscape', label: 'Landscape', w: 1800, h: 1200 },
  { id: 'portrait',  label: 'Portrait',  w: 1200, h: 1600 },
];
const COUNTS = [16, 24, 32, 40, 48];
const GREYS = [
  { id: 'black',  hex: '#1a1a1a' },
  { id: 'dark',   hex: '#555555' },
  { id: 'mid',    hex: '#8e8e8e' },
  { id: 'light',  hex: '#c2c2c2' },
];
const PAPER_COLOR = '#f6f3eb';

/* ============================================================
 * Tiny IndexedDB wrapper
 * ============================================================ */
const DB_NAME = 'thumbnail-db';
const DB_VERSION = 1;
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('meta'))  db.createObjectStore('meta');
      if (!db.objectStoreNames.contains('pages')) db.createObjectStore('pages');
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror  = e => reject(e.target.error);
  });
}
async function idbGet(store, key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readonly').objectStore(store).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
async function idbPut(store, key, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readwrite').objectStore(store).put(val, key);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}
async function idbDelete(store, key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store, 'readwrite').objectStore(store).delete(key);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}
async function idbKeys(store, prefix = '') {
  const db = await openDB();
  return new Promise((res, rej) => {
    const out = [];
    const r = db.transaction(store, 'readonly').objectStore(store).openKeyCursor();
    r.onsuccess = e => {
      const c = e.target.result;
      if (c) {
        if (!prefix || String(c.key).startsWith(prefix)) out.push(c.key);
        c.continue();
      } else res(out);
    };
    r.onerror = () => rej(r.error);
  });
}

/* ============================================================
 * Books index (persistent list of projects)
 * ============================================================ */
async function getBooks() {
  return (await idbGet('meta', 'books_index')) || [];
}
async function saveBooks(list) {
  await idbPut('meta', 'books_index', list);
}
async function upsertBook(book) {
  const list = await getBooks();
  const i = list.findIndex(b => b.id === book.id);
  book.updatedAt = Date.now();
  if (i >= 0) list[i] = book; else list.unshift(book);
  await saveBooks(list);
}
async function deleteBook(id) {
  const list = (await getBooks()).filter(b => b.id !== id);
  await saveBooks(list);
  // delete pages
  const keys = await idbKeys('pages', `${id}-`);
  for (const k of keys) await idbDelete('pages', k);
}

/* ============================================================
 * v1 → v2 migration
 * ============================================================ */
async function migrateV1IfNeeded() {
  const oldBook = await idbGet('meta', 'book');
  if (!oldBook) return;
  const list = await getBooks();
  if (list.length > 0) { await idbDelete('meta', 'book'); return; }
  // Create new project from old book
  const id = 'b_' + Date.now();
  const newBook = {
    id, name: 'Untitled',
    sizeId: oldBook.sizeId, w: oldBook.w, h: oldBook.h,
    pageCount: oldBook.pageCount, viewIdx: 0,
    createdAt: Date.now(), updatedAt: Date.now(),
  };
  await upsertBook(newBook);
  for (let i = 0; i < oldBook.pageCount; i++) {
    const blob = await idbGet('pages', `p${i}`);
    if (blob) {
      await idbPut('pages', `${id}-p${i}`, blob);
      await idbDelete('pages', `p${i}`);
    }
  }
  await idbDelete('meta', 'book');
}

/* ============================================================
 * State
 * ============================================================ */
const state = {
  view: null,           // 'projects' | 'setup' | 'draw' | 'thumbs'
  books: [],
  currentBook: null,    // currently open book
  currentViewIdx: 0,    // index into views() array
  setupSize: 'square',
  setupCount: 32,
  tool: 'pencil',
  brushSize: 3,
  greyIdx: 0,
  opacity: 1.0,
  isDrawing: false,
  lastPt: null,
};

/* ============================================================
 * Views model: cover (single) + spreads + back cover (single)
 * ============================================================ */
function viewsOf(book) {
  const out = [];
  out.push({ type: 'single', pages: [0] });
  for (let p = 1; p < book.pageCount - 1; p += 2) {
    out.push({ type: 'spread', pages: [p, p + 1] });
  }
  if (book.pageCount > 1) {
    out.push({ type: 'single', pages: [book.pageCount - 1] });
  }
  return out;
}

function counterLabelFor(view, book) {
  if (view.pages[0] === 0) return { label: 'Cover',     num: '01' };
  if (view.pages[0] === book.pageCount - 1) return { label: 'Back', num: pad(book.pageCount) };
  return { label: 'Spread', num: `${pad(view.pages[0]+1)}–${pad(view.pages[1]+1)}` };
}
function pad(n) { return String(n).padStart(2, '0'); }

/* ============================================================
 * Routing
 * ============================================================ */
function showView(name) {
  state.view = name;
  for (const v of ['projects','setup','draw','thumbs']) {
    document.getElementById(`${v}-view`).classList.toggle('hidden', v !== name);
  }
  // Drawing toolbar: visible in draw and thumbs views, hidden elsewhere.
  const tb = document.getElementById('toolbar');
  if (tb) tb.classList.toggle('hidden', !(name === 'draw' || name === 'thumbs'));
  hidePopover();
}

async function goProjects() {
  showView('projects');
  state.books = await getBooks();
  renderProjects();
}
function goSetup() {
  showView('setup');
  state.setupSize = 'square';
  state.setupCount = 32;
  renderSetup();
}
async function goDraw() {
  showView('draw');
  sizePageFrame();
  await loadCurrentViewToCanvas();
  renderTextOverlay();
  updatePageCounter();
  updateNavButtons();
  if (typeof updateLassoToolbar === 'function') updateLassoToolbar();
}
async function goThumbs() {
  exitEditMode();
  await flushBookSave();
  await saveCurrentView(true);
  showView('thumbs');
  await renderThumbs();
}

/* ============================================================
 * Projects view
 * ============================================================ */
async function renderProjects() {
  const grid = document.getElementById('project-grid');
  grid.innerHTML = '';

  if (state.books.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div>No projects yet.</div>
      <button class="big-new-btn" id="empty-new-btn">Create your first book</button>`;
    grid.appendChild(empty);
    document.getElementById('empty-new-btn').onclick = goSetup;
    return;
  }

  for (const book of state.books) {
    const card = document.createElement('div');
    card.className = 'project-card';

    const cover = document.createElement('button');
    cover.className = 'project-cover empty';
    cover.style.aspectRatio = `${book.w} / ${book.h}`;
    cover.onclick = () => openBook(book.id);
    card.appendChild(cover);

    const meta = document.createElement('div');
    meta.className = 'project-meta';
    meta.innerHTML = `
      <div class="project-name">${escapeHtml(book.name)}</div>
      <button class="project-menu-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><circle cx="6" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="18" cy="12" r="1.6"/></svg>
      </button>
    `;
    card.appendChild(meta);
    const sub = document.createElement('div');
    sub.className = 'project-sub';
    sub.textContent = `${book.pageCount} pages · ${formatDate(book.updatedAt)}`;
    card.appendChild(sub);

    grid.appendChild(card);

    meta.querySelector('.project-menu-btn').onclick = (e) => {
      e.stopPropagation();
      showProjectMenu(book, e.currentTarget);
    };

    // Lazy load cover
    idbGet('pages', `${book.id}-p0`).then(blob => {
      if (blob) {
        cover.classList.remove('empty');
        const url = URL.createObjectURL(blob);
        const im = new Image();
        im.onload = () => URL.revokeObjectURL(url);
        im.src = url;
        cover.appendChild(im);
      }
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(ts) {
  const d = new Date(ts);
  const today = new Date(); today.setHours(0,0,0,0);
  const day = new Date(d); day.setHours(0,0,0,0);
  const diff = Math.round((today - day) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7)   return `${diff} days ago`;
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

document.getElementById('new-project-btn').onclick = goSetup;

async function openBook(id) {
  const book = state.books.find(b => b.id === id);
  if (!book) return;
  state.currentBook = book;
  state.currentViewIdx = book.viewIdx || 0;
  clearUndoStacks();
  resetZoom();
  if (lassoSelection) {
    document.getElementById('selection-overlay').classList.remove('active');
    lassoSelection = null;
  }
  await goDraw();
}

/* ============================================================
 * Setup view
 * ============================================================ */
function renderSetup() {
  const grid = document.getElementById('size-grid');
  grid.innerHTML = '';
  PAGE_SIZES.forEach(s => {
    const el = document.createElement('button');
    el.className = 'size-card' + (state.setupSize === s.id ? ' active' : '');
    const maxDim = Math.max(s.w, s.h);
    el.innerHTML = `
      <div class="preview" style="width:${44 * (s.w/maxDim)}px;height:${44 * (s.h/maxDim)}px;"></div>
      <div class="name">${s.label}</div>
    `;
    el.onclick = () => { state.setupSize = s.id; renderSetup(); };
    grid.appendChild(el);
  });

  const row = document.getElementById('count-row');
  row.innerHTML = '';
  COUNTS.forEach(n => {
    const el = document.createElement('button');
    el.className = 'count-pill' + (state.setupCount === n ? ' active' : '');
    el.textContent = n;
    el.onclick = () => { state.setupCount = n; renderSetup(); };
    row.appendChild(el);
  });

  // Layout summary
  const c = state.setupCount;
  const spreads = (c - 2) / 2;
  document.getElementById('setup-summary').textContent =
    `Cover + ${spreads} spreads + back cover`;
}

document.getElementById('setup-back').onclick = goProjects;

document.getElementById('start-btn').onclick = async () => {
  const size = PAGE_SIZES.find(s => s.id === state.setupSize);
  const id = 'b_' + Date.now();
  // Generate a name
  const existing = await getBooks();
  let n = 1;
  let name = 'Untitled';
  const used = new Set(existing.map(b => b.name));
  while (used.has(name)) { n++; name = `Untitled ${n}`; }
  const book = {
    id, name,
    sizeId: size.id, w: size.w, h: size.h,
    pageCount: state.setupCount, viewIdx: 0,
    createdAt: Date.now(), updatedAt: Date.now(),
  };
  await upsertBook(book);
  state.books = await getBooks();
  state.currentBook = book;
  state.currentViewIdx = 0;
  clearUndoStacks();
  await goDraw();
};

/* ============================================================
 * Modal helpers
 * ============================================================ */
function showConfirm({ title, body, okLabel = 'OK', danger = false, onOk }) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  document.getElementById('modal-input').classList.add('hidden');
  const ok = document.getElementById('modal-ok');
  ok.textContent = okLabel;
  ok.classList.toggle('danger', danger);
  ok.classList.toggle('primary', !danger);
  const bg = document.getElementById('modal-bg');
  bg.classList.remove('hidden');
  document.getElementById('modal-cancel').onclick = () => bg.classList.add('hidden');
  ok.onclick = async () => { bg.classList.add('hidden'); await onOk(); };
}
function showPrompt({ title, body, defaultValue = '', okLabel = 'Save', onOk }) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body || '';
  const input = document.getElementById('modal-input');
  input.classList.remove('hidden');
  input.value = defaultValue;
  setTimeout(() => { input.focus(); input.select(); }, 50);
  const ok = document.getElementById('modal-ok');
  ok.textContent = okLabel;
  ok.classList.add('primary');
  ok.classList.remove('danger');
  const bg = document.getElementById('modal-bg');
  bg.classList.remove('hidden');
  document.getElementById('modal-cancel').onclick = () => bg.classList.add('hidden');
  const submit = async () => {
    const v = input.value.trim();
    if (!v) return;
    bg.classList.add('hidden');
    await onOk(v);
  };
  ok.onclick = submit;
  input.onkeydown = e => { if (e.key === 'Enter') submit(); };
}

/* ============================================================
 * Popover menu (project menu, draw-view menu)
 * ============================================================ */
function showPopover(items, anchorEl) {
  const pop = document.getElementById('popover');
  pop.innerHTML = '';
  for (const it of items) {
    if (it === 'sep') {
      const sep = document.createElement('div');
      sep.className = 'sep';
      pop.appendChild(sep);
    } else {
      const btn = document.createElement('button');
      if (it.danger) btn.classList.add('danger');
      btn.innerHTML = `${it.icon || ''}<span>${escapeHtml(it.label)}</span>`;
      btn.onclick = () => { hidePopover(); it.onClick(); };
      pop.appendChild(btn);
    }
  }
  pop.classList.remove('hidden');
  // Position near anchor
  const r = anchorEl.getBoundingClientRect();
  pop.style.left = '0px'; pop.style.top = '0px';
  const pr = pop.getBoundingClientRect();
  let left = Math.min(window.innerWidth - pr.width - 12, r.right - pr.width);
  let top  = r.bottom + 6;
  if (top + pr.height > window.innerHeight - 12) top = r.top - pr.height - 6;
  if (left < 12) left = 12;
  pop.style.left = left + 'px';
  pop.style.top  = top + 'px';
  // Click-away
  setTimeout(() => {
    document.addEventListener('pointerdown', popOutside, { once: true, capture: true });
  }, 0);
}
function hidePopover() { document.getElementById('popover').classList.add('hidden'); }
function popOutside(e) {
  const pop = document.getElementById('popover');
  if (!pop.contains(e.target)) hidePopover();
  else document.addEventListener('pointerdown', popOutside, { once: true, capture: true });
}

/* ============================================================
 * Drawing canvases
 *  - mainCanvas: committed strokes (lives in JS, not in DOM)
 *  - strokeCanvas: current stroke buffer (alpha = 1)
 *  - displayCanvas: visible <canvas>, recomposited each frame
 * ============================================================ */
const displayCanvas = document.getElementById('canvas');
const displayCtx = displayCanvas.getContext('2d', { willReadFrequently: false });
const mainCanvas   = document.createElement('canvas');
const strokeCanvas = document.createElement('canvas');
let mainCtx, strokeCtx;

function currentView() {
  return viewsOf(state.currentBook)[state.currentViewIdx];
}
function currentCanvasDims() {
  // For spread: wide canvas spanning two pages
  const v = currentView();
  const b = state.currentBook;
  if (v.type === 'spread') return { w: b.w * 2, h: b.h, isSpread: true };
  return { w: b.w, h: b.h, isSpread: false };
}

function sizePageFrame() {
  const stage = document.getElementById('canvas-stage');
  const frame = document.getElementById('page-frame');
  const dims = currentCanvasDims();
  // Stage CSS padding: 80 top, 24 sides, 130 bottom.
  const aw = stage.clientWidth  - 48;
  const ah = stage.clientHeight - 210;
  const ratio = dims.w / dims.h;
  let w = aw, h = w / ratio;
  if (h > ah) { h = ah; w = h * ratio; }
  frame.style.width  = w + 'px';
  frame.style.height = h + 'px';

  // Set canvas internal resolutions
  displayCanvas.width  = dims.w;
  displayCanvas.height = dims.h;
  mainCanvas.width     = dims.w;
  mainCanvas.height    = dims.h;
  strokeCanvas.width   = dims.w;
  strokeCanvas.height  = dims.h;
  mainCtx   = mainCanvas.getContext('2d');
  strokeCtx = strokeCanvas.getContext('2d');

  // Paper background on main
  mainCtx.fillStyle = PAPER_COLOR;
  mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
  strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);

  // Show/hide gutter dashed line
  const gutter = document.getElementById('gutter-line');
  gutter.style.display = dims.isSpread ? 'block' : 'none';

  // Lasso SVG viewBox = canvas dimensions (so polygon points use canvas coords)
  const lassoSvg = document.getElementById('lasso-svg');
  if (lassoSvg) lassoSvg.setAttribute('viewBox', `0 0 ${dims.w} ${dims.h}`);

  redrawDisplay();
}

window.addEventListener('resize', () => {
  if (state.view === 'draw') {
    // Snapshot composite, resize, restore
    const snap = displayCanvas.toDataURL('image/png');
    sizePageFrame();
    const im = new Image();
    im.onload = () => {
      mainCtx.drawImage(im, 0, 0);
      redrawDisplay();
    };
    im.src = snap;
    layoutTextBoxes();
  }
});

async function loadCurrentViewToCanvas() {
  const v = currentView();
  const b = state.currentBook;
  // Reset main to paper
  mainCtx.fillStyle = PAPER_COLOR;
  mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
  if (v.type === 'single') {
    const blob = await idbGet('pages', `${b.id}-p${v.pages[0]}`);
    if (blob) {
      const bmp = await createImageBitmap(blob);
      mainCtx.drawImage(bmp, 0, 0, b.w, b.h);
    }
  } else {
    const [pl, pr] = v.pages;
    const lblob = await idbGet('pages', `${b.id}-p${pl}`);
    const rblob = await idbGet('pages', `${b.id}-p${pr}`);
    if (lblob) {
      const bmp = await createImageBitmap(lblob);
      mainCtx.drawImage(bmp, 0, 0, b.w, b.h);
    }
    if (rblob) {
      const bmp = await createImageBitmap(rblob);
      mainCtx.drawImage(bmp, b.w, 0, b.w, b.h);
    }
  }
  strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
  redrawDisplay();
}

function redrawDisplay() {
  _redrawPending = false;
  displayCtx.globalCompositeOperation = 'source-over';
  displayCtx.globalAlpha = 1;
  displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
  displayCtx.drawImage(mainCanvas, 0, 0);
  if (strokeCanvas.width > 0) {
    // Pencil strokes use 'darken': drawing gray over black leaves the black
    // intact (the grays appear to sit underneath darker linework).
    if (activeStrokeTool === 'pencil' || state.tool === 'pencil') {
      displayCtx.globalCompositeOperation = 'darken';
    }
    if (state.opacity < 1) displayCtx.globalAlpha = state.opacity;
    displayCtx.drawImage(strokeCanvas, 0, 0);
    displayCtx.globalAlpha = 1;
    displayCtx.globalCompositeOperation = 'source-over';
  }
}
let _redrawPending = false;
function scheduleRedraw() {
  if (_redrawPending) return;
  _redrawPending = true;
  requestAnimationFrame(redrawDisplay);
}

let saveTimer = null;
async function saveCurrentView(immediate = false) {
  const doSave = async () => {
    const v = currentView();
    const b = state.currentBook;
    // mainCanvas always holds the committed result. Save halves for spread.
    if (v.type === 'single') {
      const blob = await canvasToBlob(mainCanvas);
      await idbPut('pages', `${b.id}-p${v.pages[0]}`, blob);
    } else {
      const [pl, pr] = v.pages;
      const lc = document.createElement('canvas');
      lc.width = b.w; lc.height = b.h;
      lc.getContext('2d').drawImage(mainCanvas, 0, 0, b.w, b.h, 0, 0, b.w, b.h);
      const rc = document.createElement('canvas');
      rc.width = b.w; rc.height = b.h;
      rc.getContext('2d').drawImage(mainCanvas, b.w, 0, b.w, b.h, 0, 0, b.w, b.h);
      const lblob = await canvasToBlob(lc);
      const rblob = await canvasToBlob(rc);
      await idbPut('pages', `${b.id}-p${pl}`, lblob);
      await idbPut('pages', `${b.id}-p${pr}`, rblob);
    }
    b.viewIdx = state.currentViewIdx;
    await upsertBook(b);
  };
  if (immediate) {
    if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
    return doSave();
  }
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 400);
}
function canvasToBlob(c) {
  return new Promise(res => c.toBlob(res, 'image/png'));
}

/* ============================================================
 * Stroke handling — tapered, pressure-sensitive, textured pencil
 *
 * During a stroke we accumulate points, painting only the new
 * segment incrementally for live feedback. On lift, we clear the
 * stroke buffer and repaint the entire stroke with full taper at
 * both ends, then composite onto the main canvas at the chosen
 * opacity.
 * ============================================================ */
function getCanvasPoint(e) {
  const rect = displayCanvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (displayCanvas.width  / rect.width);
  const y = (e.clientY - rect.top)  * (displayCanvas.height / rect.height);
  const pressure = (e.pointerType === 'pen' && e.pressure > 0) ? e.pressure : 0.5;
  return { x, y, p: pressure };
}

function baseWidthFor(tool) {
  return state.brushSize * (tool === 'eraser' ? 4 : 1);
}
function pressureWidth(base, p) {
  // Stronger pressure response than v2: 0.18..1.85 range
  return base * (0.18 + p * 1.67);
}
function taperFactor(i, total) {
  if (total <= 1) return 0.6;
  // Ramp length scales with stroke length but capped
  const ramp = Math.max(2, Math.min(8, total / 6));
  const tIn  = Math.min(i / ramp, 1);
  const tOut = Math.min((total - 1 - i) / ramp, 1);
  // Smooth out with a curve
  const f = Math.min(tIn, tOut);
  return 0.25 + 0.75 * f; // never go fully to zero
}

/* --- Pencil: textured stamps along path --- */
function paintTexturedDot(ctx, pt, brushW, color) {
  ctx.fillStyle = color;
  const stamps = Math.max(2, Math.floor(brushW / 3));
  ctx.beginPath();
  for (let i = 0; i < stamps; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * brushW * 0.35;
    const x = pt.x + Math.cos(angle) * dist;
    const y = pt.y + Math.sin(angle) * dist;
    const r = (brushW / 4) * (0.5 + Math.random() * 0.7);
    ctx.moveTo(x + r, y);
    ctx.arc(x, y, r, 0, Math.PI * 2);
  }
  ctx.fill();
}
function paintTexturedSegment(ctx, a, b, wA, wB, color) {
  ctx.fillStyle = color;
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 0.5) return;
  const ux = dx / dist, uy = dy / dist;
  const px = -uy, py = ux;
  const avgW = (wA + wB) / 2;
  const spacing = Math.max(0.7, avgW / 6);
  const stamps = Math.max(1, Math.ceil(dist / spacing));
  ctx.beginPath();
  for (let i = 0; i < stamps; i++) {
    const t = (i + 0.5) / stamps;
    const cx = a.x + dx * t;
    const cy = a.y + dy * t;
    const w  = wA + (wB - wA) * t;
    const jit = (Math.random() - 0.5) * w * 0.45;
    const x = cx + px * jit;
    const y = cy + py * jit;
    const r = (w / 4) * (0.55 + Math.random() * 0.75);
    ctx.moveTo(x + r, y);
    ctx.arc(x, y, r, 0, Math.PI * 2);
  }
  ctx.fill();
}

/* --- Eraser: clean tapered line, no grain --- */
function paintCleanDot(ctx, pt, brushW, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(pt.x, pt.y, brushW / 2, 0, Math.PI * 2);
  ctx.fill();
}
function paintCleanSegment(ctx, a, b, wA, wB, color) {
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = color;
  ctx.lineWidth = (wA + wB) / 2;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
}

function paintDot(ctx, pt, brushW, color, textured) {
  if (textured) paintTexturedDot(ctx, pt, brushW, color);
  else          paintCleanDot   (ctx, pt, brushW, color);
}
function paintSegment(ctx, a, b, wA, wB, color, textured) {
  if (textured) paintTexturedSegment(ctx, a, b, wA, wB, color);
  else          paintCleanSegment   (ctx, a, b, wA, wB, color);
}

/* Repaint a finished stroke from its point list, applying full taper. */
function repaintFullStroke(points) {
  const tool = state.tool;
  const textured = tool !== 'eraser';
  const color    = tool === 'eraser' ? PAPER_COLOR : GREYS[state.greyIdx].hex;
  const base     = baseWidthFor(tool);
  const n = points.length;
  strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
  if (n === 1) {
    const p = points[0];
    const w = pressureWidth(base, p.p) * taperFactor(0, 1);
    paintDot(strokeCtx, p, w, color, textured);
    return;
  }
  for (let i = 0; i < n - 1; i++) {
    const a = points[i], b = points[i + 1];
    const wA = pressureWidth(base, a.p) * taperFactor(i,     n);
    const wB = pressureWidth(base, b.p) * taperFactor(i + 1, n);
    paintSegment(strokeCtx, a, b, wA, wB, color, textured);
  }
}

let activePointerId = null;
let activePointerType = null;
let activeStrokeTool  = null;
let strokePoints    = null;

displayCanvas.addEventListener('pointerdown', e => {
  // Reserve finger for swipes if a pen has been seen, and reserve it for
  // tapping/dragging text boxes regardless of pen state when text tool active.
  if (state.tool === 'text') return;            // text handler manages its own pointers
  if (state.tool === 'lasso') return;           // lasso handler manages its own pointers
  if (pinching) return;                          // two-finger pinch in progress
  if (e.pointerType === 'touch' && supportsPen()) return;
  e.preventDefault();
  activePointerId = e.pointerId;
  activePointerType = e.pointerType;
  activeStrokeTool  = state.tool;
  displayCanvas.setPointerCapture(e.pointerId);
  state.isDrawing = true;
  strokePoints = [getCanvasPoint(e)];
  // Live preview: paint the first dot (no taper-out yet — it's only one point)
  strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
  const p = strokePoints[0];
  const tool = state.tool;
  const textured = tool !== 'eraser';
  const color    = tool === 'eraser' ? PAPER_COLOR : GREYS[state.greyIdx].hex;
  const base     = baseWidthFor(tool);
  const w        = pressureWidth(base, p.p) * 0.6;  // start small, will grow as stroke develops
  paintDot(strokeCtx, p, w, color, textured);
  scheduleRedraw();
});

displayCanvas.addEventListener('pointermove', e => {
  if (!state.isDrawing || e.pointerId !== activePointerId) return;
  e.preventDefault();
  const events = (typeof e.getCoalescedEvents === 'function') ? e.getCoalescedEvents() : [e];
  const tool = state.tool;
  const textured = tool !== 'eraser';
  const color    = tool === 'eraser' ? PAPER_COLOR : GREYS[state.greyIdx].hex;
  const base     = baseWidthFor(tool);
  for (const ev of events) {
    const pt = getCanvasPoint(ev);
    const a  = strokePoints[strokePoints.length - 1];
    strokePoints.push(pt);
    const i  = strokePoints.length - 1;
    // Live taper-in only (we don't know the end yet)
    const tIn = Math.min(i / 8, 1);
    const wA = pressureWidth(base, a.p)  * (0.25 + 0.75 * Math.min((i - 1) / 8, 1));
    const wB = pressureWidth(base, pt.p) * (0.25 + 0.75 * tIn);
    paintSegment(strokeCtx, a, pt, wA, wB, color, textured);
  }
  scheduleRedraw();
});

async function endStroke() {
  if (!state.isDrawing) return;
  state.isDrawing = false;
  activePointerId = null;
  activePointerType = null;
  // Snapshot the strokeCanvas SYNCHRONOUSLY here. We can't drawImage(strokeCanvas)
  // after an `await` below, because a new stroke may start in that gap and clear
  // (or repaint) the live strokeCanvas, which would erase or replace our pixels.
  const strokeSnap = document.createElement('canvas');
  strokeSnap.width  = strokeCanvas.width;
  strokeSnap.height = strokeCanvas.height;
  strokeSnap.getContext('2d').drawImage(strokeCanvas, 0, 0);
  // Free the strokeCanvas for the next stroke right away.
  strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
  strokePoints = null;
  // Snapshot the canvas state BEFORE this stroke is committed (for undo).
  await pushUndoState();
  // Commit our snapshot to main. Any in-progress new stroke (started during the
  // await) lives in the now-fresh strokeCanvas and is composited by redrawDisplay.
  mainCtx.globalAlpha = state.opacity;
  if (activeStrokeTool === 'pencil') {
    // Darken: black-on-gray and gray-on-black both end up at the darker tone,
    // so the linework reads as on top of the shading without double-darkening
    // overlapped grays.
    mainCtx.globalCompositeOperation = 'darken';
  }
  mainCtx.drawImage(strokeSnap, 0, 0);
  mainCtx.globalAlpha = 1;
  mainCtx.globalCompositeOperation = 'source-over';
  activeStrokeTool = null;
  redrawDisplay();
  saveCurrentView();
}

/* ============================================================
 * Undo / Redo — per-view stacks of mainCanvas snapshots (PNG blobs).
 * Stacks are cleared whenever we load a different view's canvas.
 * ============================================================ */
const UNDO_MAX = 20;
let undoStack = [];
let redoStack = [];

function pushUndoState() {
  return new Promise(res => {
    mainCanvas.toBlob(blob => {
      if (blob) {
        undoStack.push(blob);
        if (undoStack.length > UNDO_MAX) undoStack.shift();
        redoStack = [];
      }
      updateUndoRedoButtons();
      res();
    }, 'image/png');
  });
}

function snapshotMainAsBlob() {
  return new Promise(res => mainCanvas.toBlob(b => res(b), 'image/png'));
}

async function applySnapshot(blob) {
  const bmp = await createImageBitmap(blob);
  mainCtx.fillStyle = PAPER_COLOR;
  mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
  mainCtx.drawImage(bmp, 0, 0);
  redrawDisplay();
}

async function undo() {
  if (undoStack.length === 0) return;
  const current = await snapshotMainAsBlob();
  if (current) redoStack.push(current);
  const blob = undoStack.pop();
  await applySnapshot(blob);
  await saveCurrentView(true);
  updateUndoRedoButtons();
}
async function redo() {
  if (redoStack.length === 0) return;
  const current = await snapshotMainAsBlob();
  if (current) undoStack.push(current);
  const blob = redoStack.pop();
  await applySnapshot(blob);
  await saveCurrentView(true);
  updateUndoRedoButtons();
}
function clearUndoStacks() {
  undoStack = [];
  redoStack = [];
  updateUndoRedoButtons();
}
function updateUndoRedoButtons() {
  const u = document.getElementById('undo-btn');
  const r = document.getElementById('redo-btn');
  if (u) u.classList.toggle('disabled', undoStack.length === 0);
  if (r) r.classList.toggle('disabled', redoStack.length === 0);
}
document.getElementById('undo-btn').onclick = undo;
document.getElementById('redo-btn').onclick = redo;
displayCanvas.addEventListener('pointerup', endStroke);
displayCanvas.addEventListener('pointercancel', endStroke);
displayCanvas.addEventListener('pointerleave', endStroke);

let _penSeen = false;
window.addEventListener('pointerdown', e => { if (e.pointerType === 'pen') _penSeen = true; }, true);
function supportsPen() { return _penSeen; }

/* ============================================================
 * Page navigation
 * ============================================================ */
async function flipView(dir) {
  const views = viewsOf(state.currentBook);
  const next = state.currentViewIdx + dir;
  if (next < 0 || next >= views.length) return;
  exitEditMode();
  if (lassoSelection) await commitSelection(true);
  await flushBookSave();
  await saveCurrentView(true);
  clearUndoStacks();
  resetZoom();
  const frame = document.getElementById('page-frame');
  frame.classList.add(dir > 0 ? 'flip-out-left' : 'flip-out-right');
  await sleep(220);
  state.currentViewIdx = next;
  state.currentBook.viewIdx = next;
  await upsertBook(state.currentBook);
  // Resize frame for new view (single vs spread changes ratio)
  sizePageFrame();
  await loadCurrentViewToCanvas();
  renderTextOverlay();
  // Reset animation
  frame.style.transition = 'none';
  frame.classList.remove('flip-out-left', 'flip-out-right');
  frame.classList.add(dir > 0 ? 'flip-out-right' : 'flip-out-left');
  void frame.offsetWidth;
  frame.style.transition = '';
  frame.classList.remove('flip-out-left', 'flip-out-right');
  updatePageCounter();
  updateNavButtons();
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updatePageCounter() {
  const v = currentView();
  const lbl = counterLabelFor(v, state.currentBook);
  document.getElementById('counter-label').textContent = lbl.label;
  document.getElementById('counter-num').textContent = lbl.num;
}
function updateNavButtons() {
  const views = viewsOf(state.currentBook);
  document.getElementById('prev-view').classList.toggle('disabled', state.currentViewIdx === 0);
  document.getElementById('next-view').classList.toggle('disabled', state.currentViewIdx === views.length - 1);
}

document.getElementById('prev-view').onclick = () => flipView(-1);
document.getElementById('next-view').onclick = () => flipView(+1);

/* ============================================================
 * Zoom + pan (two-finger pinch / drag)
 * ============================================================ */
const zoomState = { zoom: 1, panX: 0, panY: 0 };
const ZOOM_MIN = 1, ZOOM_MAX = 6;
let pinchState = null;
let pinching = false;

function applyZoomTransform() {
  const z = document.getElementById('zoom-container');
  z.style.transform = `translate(${zoomState.panX}px, ${zoomState.panY}px) scale(${zoomState.zoom})`;
  document.getElementById('fit-btn').classList.toggle('hidden', zoomState.zoom <= 1.001 && zoomState.panX === 0 && zoomState.panY === 0);
}
function resetZoom() {
  zoomState.zoom = 1; zoomState.panX = 0; zoomState.panY = 0;
  applyZoomTransform();
}
document.getElementById('fit-btn').onclick = () => resetZoom();

/* Swipe (finger only when a pen has been used) */
const stage = document.getElementById('canvas-stage');
let swipeStart = null;

function abortInProgressStroke() {
  // Don't kill a pen-driven stroke just because a finger touched the screen —
  // that's almost always palm rest while drawing with the Pencil.
  if (state.isDrawing && activePointerType !== 'pen') {
    strokeCtx.clearRect(0, 0, strokeCanvas.width, strokeCanvas.height);
    state.isDrawing = false;
    strokePoints = null;
    activePointerId = null;
    activePointerType = null;
    redrawDisplay();
  }
}

stage.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    if (zoomState.zoom > 1.001) { swipeStart = null; return; } // no swipe when zoomed
    swipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
    return;
  }
  if (e.touches.length === 2) {
    swipeStart = null;
    abortInProgressStroke();
    pinching = true;
    e.preventDefault();
    const t1 = e.touches[0], t2 = e.touches[1];
    pinchState = {
      startDist: Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) || 1,
      startMidX: (t1.clientX + t2.clientX) / 2,
      startMidY: (t1.clientY + t2.clientY) / 2,
      startZoom: zoomState.zoom,
      startPanX: zoomState.panX,
      startPanY: zoomState.panY,
    };
  }
}, { passive: false });

stage.addEventListener('touchmove', e => {
  if (!pinching || !pinchState || e.touches.length < 2) return;
  e.preventDefault();
  const t1 = e.touches[0], t2 = e.touches[1];
  const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) || 1;
  const midX = (t1.clientX + t2.clientX) / 2;
  const midY = (t1.clientY + t2.clientY) / 2;
  const newZoom = Math.max(0.6, Math.min(ZOOM_MAX, pinchState.startZoom * (dist / pinchState.startDist)));

  // Zoom around the pinch midpoint: compensate pan so the screen point under the
  // midpoint stays put when the scale changes.
  const z = document.getElementById('zoom-container');
  const r = z.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;
  // Distance from container center to ORIGINAL midpoint (in screen px)
  const dx = pinchState.startMidX - cx + (zoomState.panX - pinchState.startPanX);
  const dy = pinchState.startMidY - cy + (zoomState.panY - pinchState.startPanY);
  const ratio = newZoom / pinchState.startZoom;
  const dragDx = midX - pinchState.startMidX;
  const dragDy = midY - pinchState.startMidY;

  zoomState.zoom = newZoom;
  zoomState.panX = pinchState.startPanX + dragDx + (pinchState.startMidX - cx) * (1 - ratio);
  zoomState.panY = pinchState.startPanY + dragDy + (pinchState.startMidY - cy) * (1 - ratio);
  applyZoomTransform();
}, { passive: false });

stage.addEventListener('touchend', e => {
  if (pinching && e.touches.length < 2) {
    pinching = false;
    pinchState = null;
    if (zoomState.zoom <= 1.05) resetZoom();
    return;
  }
  if (!swipeStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - swipeStart.x;
  const dy = t.clientY - swipeStart.y;
  const dt = Date.now() - swipeStart.t;
  swipeStart = null;
  if (dt < 600 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    flipView(dx < 0 ? +1 : -1);
  }
});
stage.addEventListener('touchcancel', () => {
  pinching = false; pinchState = null; swipeStart = null;
});

/* Desktop / laptop: trackpad pinch and Ctrl/Cmd + scroll send wheel events with
 * ctrlKey/metaKey set. The browser default would zoom the entire page (including
 * toolbars). Capture them and apply our canvas-only zoom instead, around the cursor. */
stage.addEventListener('wheel', e => {
  // Any wheel/trackpad gesture over the canvas zooms — the canvas viewport
  // doesn't need to scroll. Cmd/Ctrl + wheel still works (and trackpad pinch
  // automatically sends ctrlKey too).
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * 0.01);
  const newZoom = Math.max(0.6, Math.min(ZOOM_MAX, zoomState.zoom * factor));
  const z = document.getElementById('zoom-container');
  const r = z.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;
  const ratio = newZoom / zoomState.zoom;
  zoomState.panX += (e.clientX - cx) * (1 - ratio);
  zoomState.panY += (e.clientY - cy) * (1 - ratio);
  zoomState.zoom = newZoom;
  applyZoomTransform();
  if (zoomState.zoom <= 1.05) resetZoom();
}, { passive: false });

/* Also block the browser's "Ctrl/Cmd + plus/minus/0" zoom shortcuts in the draw
 * view so the toolbars don't get scaled by accident. */
window.addEventListener('keydown', e => {
  if (state.view !== 'draw') return;
  if (e.target.matches && e.target.matches('input, textarea, [contenteditable="true"]')) return;
  const ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && (e.key === '+' || e.key === '=' || e.key === '-' || e.key === '0')) {
    e.preventDefault();
    if (e.key === '0') resetZoom();
    return;
  }
  if (ctrl && (e.key === 'c' || e.key === 'C')) {
    if (lassoSelection) { e.preventDefault(); copySelectionToClipboard(); }
    return;
  }
  if (ctrl && (e.key === 'x' || e.key === 'X')) {
    if (lassoSelection) { e.preventDefault(); cutSelectionToClipboard(); }
    return;
  }
  if (ctrl && (e.key === 'v' || e.key === 'V')) {
    if (selectionClipboard) { e.preventDefault(); pasteSelectionFromClipboard(); }
    return;
  }
  // Plain keys
  if (!ctrl && (e.key === 'Delete' || e.key === 'Backspace')) {
    if (lassoSelection) {
      e.preventDefault();
      // Discard the floating selection (paper already showing where it was)
      document.getElementById('selection-overlay').classList.remove('active');
      lassoSelection = null;
    }
  }
});

/* ============================================================
 * Selection clipboard — Cmd/Ctrl + C/X/V on a floating lasso selection.
 * ============================================================ */
let selectionClipboard = null;  // { canvas, w, h }

function copySelectionToClipboard() {
  if (!lassoSelection) return;
  const c = document.createElement('canvas');
  c.width = lassoSelection.w;
  c.height = lassoSelection.h;
  c.getContext('2d').drawImage(lassoSelection.canvas, 0, 0);
  selectionClipboard = { canvas: c, w: lassoSelection.w, h: lassoSelection.h };
  updateLassoToolbar();
  if (typeof toast === 'function') toast('Selection copied');
}
function cutSelectionToClipboard() {
  if (!lassoSelection) return;
  copySelectionToClipboard();
  // Discard floating selection without re-baking — original pixels were already
  // erased when the lasso was created.
  document.getElementById('selection-overlay').classList.remove('active');
  lassoSelection = null;
  updateLassoToolbar();
  if (typeof toast === 'function') toast('Selection cut');
}
function deleteSelection() {
  if (!lassoSelection) return;
  document.getElementById('selection-overlay').classList.remove('active');
  lassoSelection = null;
  updateLassoToolbar();
}

document.getElementById('lasso-copy'  ).onclick = () => { copySelectionToClipboard(); };
document.getElementById('lasso-cut'   ).onclick = () => { cutSelectionToClipboard(); };
document.getElementById('lasso-paste' ).onclick = () => { pasteSelectionFromClipboard(); };
document.getElementById('lasso-delete').onclick = () => { deleteSelection(); };
function updateLassoToolbar() {
  const tb  = document.getElementById('lasso-toolbar');
  if (!tb) return;
  const haveSel  = !!lassoSelection;
  const haveClip = !!selectionClipboard;
  const visible  = state.tool === 'lasso' && (haveSel || haveClip);
  tb.classList.toggle('hidden', !visible);
  document.getElementById('lasso-copy'  ).disabled = !haveSel;
  document.getElementById('lasso-cut'   ).disabled = !haveSel;
  document.getElementById('lasso-paste' ).disabled = !haveClip;
  document.getElementById('lasso-delete').disabled = !haveSel;
}

async function pasteSelectionFromClipboard() {
  if (!selectionClipboard) return;
  if (lassoSelection) await commitSelection();
  await pushUndoState();
  const w = selectionClipboard.w, h = selectionClipboard.h;
  // Place at view center (in canvas coords).
  const cx = mainCanvas.width  / 2 - w / 2;
  const cy = mainCanvas.height / 2 - h / 2;
  const sel = document.createElement('canvas');
  sel.width = w; sel.height = h;
  sel.getContext('2d').drawImage(selectionClipboard.canvas, 0, 0);
  lassoSelection = {
    canvas: sel,
    originalX: Math.max(0, Math.floor(cx)),
    originalY: Math.max(0, Math.floor(cy)),
    w, h, tx: 0, ty: 0, sx: 1, sy: 1, rot: 0,
  };
  const overlayCanvas = document.getElementById('sel-canvas');
  overlayCanvas.width = w; overlayCanvas.height = h;
  overlayCanvas.getContext('2d').drawImage(sel, 0, 0);
  applySelectionLayout();
  document.getElementById('selection-overlay').classList.add('active');
  setTool('lasso');
  if (typeof toast === 'function') toast('Pasted');
}

/* ============================================================
 * Toolbar wiring
 * ============================================================ */
function setTool(t) {
  // Auto-commit any active lasso selection when leaving lasso mode
  if (state.tool === 'lasso' && t !== 'lasso' && lassoSelection) commitSelection(true);
  state.tool = t;
  document.getElementById('tool-pencil').classList.toggle('active', t === 'pencil');
  document.getElementById('tool-eraser').classList.toggle('active', t === 'eraser');
  document.getElementById('tool-text'  ).classList.toggle('active', t === 'text');
  document.getElementById('tool-lasso' ).classList.toggle('active', t === 'lasso');
  document.getElementById('textbox-layer').classList.toggle('text-active', t === 'text');
  if (t !== 'text') deselectTextBox();
  if (typeof updateLassoToolbar === 'function') updateLassoToolbar();
}
document.getElementById('tool-pencil').onclick = () => setTool('pencil');
document.getElementById('tool-eraser').onclick = () => setTool('eraser');
document.getElementById('tool-text'  ).onclick = () => setTool('text');
document.getElementById('tool-lasso' ).onclick = () => setTool('lasso');

const sizeSlider = document.getElementById('brush-size');
const sizeDot    = document.getElementById('size-dot');
function updateSizeReadout() {
  const d = Math.max(2, Math.min(18, state.brushSize));
  sizeDot.style.width = d + 'px'; sizeDot.style.height = d + 'px';
}
sizeSlider.oninput = () => { state.brushSize = +sizeSlider.value; updateSizeReadout(); };
updateSizeReadout();

const opSlider = document.getElementById('brush-opacity');
const opDot    = document.getElementById('opacity-dot');
function updateOpReadout() {
  // opacity dot: same color, faded by alpha
  opDot.style.width = '14px'; opDot.style.height = '14px';
  opDot.style.background = GREYS[state.greyIdx].hex;
  opDot.style.opacity = state.opacity.toFixed(2);
}
opSlider.oninput = () => { state.opacity = (+opSlider.value) / 100; updateOpReadout(); };
updateOpReadout();

function renderSwatches() {
  const wrap = document.getElementById('swatches');
  wrap.innerHTML = '';
  GREYS.forEach((g, i) => {
    const el = document.createElement('button');
    el.className = 'swatch' + (i === state.greyIdx ? ' active' : '');
    el.innerHTML = `<div class="dot" style="background:${g.hex}"></div>`;
    el.onclick = () => {
      state.greyIdx = i;
      setTool('pencil');
      renderSwatches();
      updateOpReadout();
    };
    wrap.appendChild(el);
  });
}
renderSwatches();

/* ============================================================
 * Text boxes
 * ============================================================ */
function uid() { return 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7); }

function pageBoxes(pageNum) {
  const b = state.currentBook;
  if (!b.textBoxes) b.textBoxes = {};
  const k = `p${pageNum}`;
  if (!b.textBoxes[k]) b.textBoxes[k] = [];
  return b.textBoxes[k];
}
function frameScale() {
  // Untransformed CSS pixels per canvas pixel — for laying out children inside zoom-container.
  const frame = document.getElementById('page-frame');
  return frame.clientWidth / displayCanvas.width;
}
function frameScreenScale() {
  // Screen pixels per canvas pixel — accounts for zoom transform. Use for input/drag mapping.
  const r = displayCanvas.getBoundingClientRect();
  return r.width / displayCanvas.width;
}

let selectedBox = null;  // { box, pageNum, el }
let editingBox  = null;
let bookSaveTimer = null;

function saveCurrentBookSoon() {
  if (bookSaveTimer) clearTimeout(bookSaveTimer);
  bookSaveTimer = setTimeout(async () => {
    state.currentBook.updatedAt = Date.now();
    await upsertBook(state.currentBook);
    bookSaveTimer = null;
  }, 350);
}
async function flushBookSave() {
  if (bookSaveTimer) { clearTimeout(bookSaveTimer); bookSaveTimer = null; }
  if (state.currentBook) {
    state.currentBook.updatedAt = Date.now();
    await upsertBook(state.currentBook);
  }
}

function clearTextOverlay() {
  const layer = document.getElementById('textbox-layer');
  layer.innerHTML = '';
  selectedBox = null;
  editingBox = null;
  hideTextToolbar();
}

function renderTextOverlay() {
  clearTextOverlay();
  const v = currentView();
  const b = state.currentBook;
  const layer = document.getElementById('textbox-layer');
  for (const pn of v.pages) {
    const boxes = (b.textBoxes && b.textBoxes[`p${pn}`]) || [];
    for (const box of boxes) {
      const el = createTextBoxElement(box, pn);
      layer.appendChild(el);
    }
  }
  layoutTextBoxes();
}

function layoutTextBoxes() {
  const s = frameScale();
  const layer = document.getElementById('textbox-layer');
  const v = currentView();
  const b = state.currentBook;
  for (const el of layer.querySelectorAll('.textbox')) {
    const id = el.dataset.id;
    const pn = +el.dataset.page;
    const box = pageBoxes(pn).find(bb => bb.id === id);
    if (!box) continue;
    const xOffset = (v.type === 'spread' && pn === v.pages[1]) ? b.w : 0;
    el.style.left      = ((box.x + xOffset) * s) + 'px';
    el.style.top       = (box.y * s) + 'px';
    el.style.width     = (box.w * s) + 'px';
    el.style.height    = (box.h * s) + 'px';
    el.style.fontSize  = (box.size * s) + 'px';
    el.style.textAlign = box.align || 'left';
    const ta = el.querySelector('.textbox-input');
    if (ta) ta.style.textAlign = box.align || 'left';
  }
  if (selectedBox) positionTextToolbar();
}

function createTextBoxElement(box, pageNum) {
  const el = document.createElement('div');
  el.className = 'textbox';
  el.dataset.id = box.id;
  el.dataset.page = pageNum;

  const ta = document.createElement('textarea');
  ta.className = 'textbox-input';
  ta.placeholder = 'Text';
  ta.value = box.text || '';
  ta.setAttribute('readonly', '');
  ta.spellcheck = false;
  ta.autocapitalize = 'sentences';
  ta.autocomplete = 'off';
  ta.setAttribute('autocorrect', 'off');
  ta.setAttribute('inputmode', 'text');
  el.appendChild(ta);

  const handle = document.createElement('div');
  handle.className = 'resize-handle';
  el.appendChild(handle);

  attachTextBoxHandlers(el, box, pageNum);
  return el;
}

function attachTextBoxHandlers(el, box, pageNum) {
  let dragState = null;   // for moving
  let resizeState = null; // for resizing

  const handle = el.querySelector('.resize-handle');
  handle.addEventListener('pointerdown', e => {
    if (state.tool !== 'text') return;
    e.stopPropagation();
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    resizeState = { startX: e.clientX, startY: e.clientY, origW: box.w, origH: box.h };
    selectTextBox(box, +el.dataset.page, el, false);
  });
  handle.addEventListener('pointermove', e => {
    if (!resizeState) return;
    const s = frameScreenScale();
    box.w = Math.max(40,  resizeState.origW + (e.clientX - resizeState.startX) / s);
    box.h = Math.max(box.size + 8, resizeState.origH + (e.clientY - resizeState.startY) / s);
    layoutTextBoxes();
  });
  handle.addEventListener('pointerup', () => {
    if (!resizeState) return;
    resizeState = null;
    saveCurrentBookSoon();
  });

  el.addEventListener('pointerdown', e => {
    if (state.tool !== 'text') return;
    if (e.target === handle) return;
    if (editingBox && editingBox.box.id === box.id) return;  // text editing — let cursor work
    e.stopPropagation();
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    dragState = { startX: e.clientX, startY: e.clientY, origX: box.x, origY: box.y, dragging: false };
    selectTextBox(box, +el.dataset.page, el, false);
  });
  el.addEventListener('pointermove', e => {
    if (!dragState) return;
    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    if (!dragState.dragging && Math.hypot(dx, dy) > 4) dragState.dragging = true;
    if (dragState.dragging) {
      const s = frameScreenScale();
      box.x = dragState.origX + dx / s;
      box.y = dragState.origY + dy / s;
      layoutTextBoxes();
    }
  });
  el.addEventListener('pointerup', e => {
    if (!dragState) return;
    const wasDragging = dragState.dragging;
    dragState = null;
    try { el.releasePointerCapture(e.pointerId); } catch (_) {}
    if (!wasDragging) {
      // Tap: if already selected and not editing, enter edit mode
      if (selectedBox && selectedBox.box.id === box.id && (!editingBox || editingBox.box.id !== box.id)) {
        enterEditMode(box, +el.dataset.page, el);
      }
      return;
    }
    // Drag complete: page reassignment if box center crossed gutter
    const v = currentView();
    let moved = false;
    if (v.type === 'spread') {
      const cx = box.x + box.w / 2;
      const b = state.currentBook;
      const curPn = +el.dataset.page;
      if (curPn === v.pages[0] && cx > b.w) {
        movePageBox(box, curPn, v.pages[1], -b.w); moved = true;
      } else if (curPn === v.pages[1] && cx < 0) {
        movePageBox(box, curPn, v.pages[0], +b.w); moved = true;
      }
    }
    saveCurrentBookSoon();
    if (moved) {
      renderTextOverlay();
      const newEl = document.querySelector(`.textbox[data-id="${box.id}"]`);
      if (newEl) selectTextBox(box, +newEl.dataset.page, newEl, false);
    }
  });
}

function movePageBox(box, fromPage, toPage, xDelta) {
  const src = pageBoxes(fromPage);
  const i = src.findIndex(b => b.id === box.id);
  if (i >= 0) src.splice(i, 1);
  box.x = box.x + xDelta;
  pageBoxes(toPage).push(box);
}

function selectTextBox(box, pageNum, el, edit) {
  if (selectedBox && selectedBox.box.id !== box.id) {
    selectedBox.el.classList.remove('selected');
  }
  if (editingBox && editingBox.box.id !== box.id) {
    exitEditMode();
  }
  selectedBox = { box, pageNum, el };
  el.classList.add('selected');
  showTextToolbar();
  positionTextToolbar();
  if (edit) enterEditMode(box, pageNum, el);
}
function deselectTextBox() {
  if (editingBox) exitEditMode();
  if (selectedBox) {
    selectedBox.el.classList.remove('selected');
    selectedBox = null;
  }
  hideTextToolbar();
}

function enterEditMode(box, pageNum, el) {
  editingBox = { box, pageNum, el };
  el.classList.add('editing');
  const ta = el.querySelector('.textbox-input');
  ta.removeAttribute('readonly');
  // Focus immediately while still inside the user-gesture stack so iOS shows keyboard
  ta.focus();
  const len = ta.value.length;
  try { ta.setSelectionRange(len, len); } catch (_) {}
  ta.oninput = () => {
    box.text = ta.value;
    /* legacy */ ;(/ /g, ' ');
    saveCurrentBookSoon();
  };
}
function exitEditMode() {
  if (!editingBox) return;
  const { el } = editingBox;
  const ta = el.querySelector('.textbox-input');
  if (ta) {
    ta.setAttribute('readonly', '');
    try { ta.blur(); } catch (_) {}
  }
  el.classList.remove('editing');
  editingBox = null;
}

function showTextToolbar() { document.getElementById('text-toolbar').classList.remove('hidden'); }
function hideTextToolbar() { document.getElementById('text-toolbar').classList.add('hidden'); }
function positionTextToolbar() {
  if (!selectedBox) return;
  const tt = document.getElementById('text-toolbar');
  const r  = selectedBox.el.getBoundingClientRect();
  const tr = tt.getBoundingClientRect();
  let left = r.left + r.width / 2 - tr.width / 2;
  let top  = r.top - tr.height - 8;
  if (top < 70) top = r.bottom + 8;
  left = Math.max(12, Math.min(left, window.innerWidth - tr.width - 12));
  tt.style.left = left + 'px';
  tt.style.top  = top + 'px';
  document.getElementById('tt-size').textContent = String(Math.round(selectedBox.box.size));
  ['l','c','r'].forEach(a => document.getElementById(`tt-align-${a}`).classList.remove('active'));
  const map = { left: 'l', center: 'c', right: 'r' };
  const k = map[selectedBox.box.align || 'left'];
  if (k) document.getElementById(`tt-align-${k}`).classList.add('active');
}

document.getElementById('tt-size-up').onclick = () => {
