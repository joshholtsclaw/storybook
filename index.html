/* Tap on empty layer area (text tool active): deselect, or create a new box */
document.getElementById('textbox-layer').addEventListener('pointerdown', e => {
  if (state.tool !== 'text') return;
  if (e.target.closest('.textbox')) return;
  e.preventDefault();
  if (selectedBox) { deselectTextBox(); return; }
  const layer = document.getElementById('textbox-layer');
  const rect = layer.getBoundingClientRect();
  const s = frameScreenScale();
  const localX = (e.clientX - rect.left) / s;
  const localY = (e.clientY - rect.top)  / s;
  const v = currentView();
  const b = state.currentBook;
  let pageNum = v.pages[0], pageX = localX;
  if (v.type === 'spread' && localX > b.w) { pageNum = v.pages[1]; pageX = localX - b.w; }
  const defaultSize = Math.max(20, Math.round(b.h / 45));
  const defaultW = Math.min(b.w * 0.6, 360);
  const defaultH = defaultSize * 3 + 16;
  const box = {
    id: uid(),
    x: Math.max(0, Math.min(b.w - defaultW, pageX - defaultW / 2)),
    y: Math.max(0, Math.min(b.h - defaultH, pageY_clamp(localY, b.h, defaultH))),
    w: defaultW, h: defaultH,
    text: '', size: defaultSize, align: 'left',
  };
  pageBoxes(pageNum).push(box);
  saveCurrentBookSoon();
  const el = createTextBoxElement(box, pageNum);
  layer.appendChild(el);
  layoutTextBoxes();
  selectTextBox(box, pageNum, el, true);
});
function pageY_clamp(y, pageH, boxH) { return Math.max(0, Math.min(pageH - boxH, y - boxH / 2)); }

/* Bake a textbox onto a 2D canvas (used by thumbnails and exports). */
function drawTextBoxOnCanvas(ctx, tb) {
  if (!tb.text) return;
  ctx.save();
  ctx.fillStyle = '#1a1a1a';
  ctx.font = `${tb.size}px "Courier New", "Courier", ui-monospace, monospace`;
  ctx.textBaseline = 'top';
  const lineHeight = tb.size * 1.3;
  const padX = 6, padY = 4;
  const innerW = tb.w - padX * 2;
  const lines = wrapMonospaceText(ctx, tb.text, innerW);
  for (let i = 0; i < lines.length; i++) {
    const yy = tb.y + padY + i * lineHeight;
    if (yy + lineHeight > tb.y + tb.h) break;
    let xx = tb.x + padX;
    const w = ctx.measureText(lines[i]).width;
    if (tb.align === 'center') xx = tb.x + (tb.w - w) / 2;
    if (tb.align === 'right')  xx = tb.x + tb.w - padX - w;
    ctx.fillText(lines[i], xx, yy);
  }
  ctx.restore();
}
function wrapMonospaceText(ctx, text, maxW) {
  const out = [];
  for (const para of String(text).split('\n')) {
    if (!para) { out.push(''); continue; }
    const tokens = para.split(/(\s+)/);
    let line = '';
    for (const tok of tokens) {
      const test = line + tok;
      if (ctx.measureText(test).width > maxW && line) {
        out.push(line.replace(/\s+$/, ''));
        line = tok.replace(/^\s+/, '');
      } else {
        line = test;
      }
    }
    if (line) out.push(line);
  }
  return out.length ? out : [''];
}

/* ============================================================
 * Lasso tool
 *
 *   - Drag with the lasso tool active to draw a freehand selection path.
 *   - On lift, the path closes and the enclosed pixels become a floating
 *     selection that can be moved (drag), freely scaled (corner handles
 *     or two-finger pinch), and rotated (top handle or two-finger twist).
 *   - Tap on the canvas outside the selection to commit it back into
 *     the page at its new transform. Switching tools or flipping the
 *     page also commits.
 *   - The pre-extract canvas state is pushed to the undo stack as a
 *     single entry, so one undo reverts the whole lasso operation.
 * ============================================================ */
let lassoSelection  = null;   // { canvas, originalX, originalY, w, h, tx, ty, sx, sy, rot }
let lassoPathPoints = null;
let lassoActivePtr  = null;
let selMoveState    = null;
let selResizeState  = null;
let selRotateState  = null;
let selPinchState   = null;

function lassoPointFromEvent(e) {
  const rect = displayCanvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (displayCanvas.width  / rect.width),
    y: (e.clientY - rect.top)  * (displayCanvas.height / rect.height),
  };
}
function screenToCanvasXY(sx, sy) {
  const rect = displayCanvas.getBoundingClientRect();
  return {
    x: (sx - rect.left) * (displayCanvas.width  / rect.width),
    y: (sy - rect.top)  * (displayCanvas.height / rect.height),
  };
}

function applySelectionLayout() {
  if (!lassoSelection) return;
  const s = frameScale();
  const sel = lassoSelection;
  const ov = document.getElementById('selection-overlay');
  ov.style.left   = (sel.originalX * s) + 'px';
  ov.style.top    = (sel.originalY * s) + 'px';
  ov.style.width  = (sel.w * s) + 'px';
  ov.style.height = (sel.h * s) + 'px';
  ov.style.transform =
    `translate(${sel.tx * s}px, ${sel.ty * s}px) ` +
    `rotate(${sel.rot}rad) ` +
    `scale(${sel.sx}, ${sel.sy})`;
}

function updateLassoSVG() {
  const poly = document.getElementById('lasso-poly');
  if (!lassoPathPoints) { poly.setAttribute('points', ''); return; }
  poly.setAttribute('points',
    lassoPathPoints.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '));
}

async function extractSelectionFromPath(pathPoints) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of pathPoints) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  minX = Math.max(0, Math.floor(minX));
  minY = Math.max(0, Math.floor(minY));
  maxX = Math.min(mainCanvas.width,  Math.ceil(maxX));
  maxY = Math.min(mainCanvas.height, Math.ceil(maxY));
  const w = maxX - minX, h = maxY - minY;
  if (w < 4 || h < 4) return;

  // Push undo BEFORE extracting — single undo reverts the whole operation.
  await pushUndoState();

  // Extract masked pixels into the selection canvas.
  const sel = document.createElement('canvas');
  sel.width = w; sel.height = h;
  const sctx = sel.getContext('2d');
  sctx.beginPath();
  for (let i = 0; i < pathPoints.length; i++) {
    const x = pathPoints[i].x - minX;
    const y = pathPoints[i].y - minY;
    if (i === 0) sctx.moveTo(x, y); else sctx.lineTo(x, y);
  }
  sctx.closePath();
  sctx.clip();
  sctx.drawImage(mainCanvas, -minX, -minY);

  // Knock out paper-colored pixels so only the linework remains opaque.
  // Pixels close to paper become transparent; mid-distance ones get a smooth
  // alpha ramp (preserves anti-aliased edges of strokes).
  const imageData = sctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const PR = 246, PG = 243, PB = 235;        // matches PAPER_COLOR
  const NEAR = 12;                            // paper if within this max-channel-distance
  const FAR  = 48;                            // fully opaque beyond this
  const SPAN = FAR - NEAR;
  for (let i = 0; i < data.length; i += 4) {
    if (data[i + 3] === 0) continue;
    const dr = Math.abs(data[i]     - PR);
    const dg = Math.abs(data[i + 1] - PG);
    const db = Math.abs(data[i + 2] - PB);
    const dist = dr > dg ? (dr > db ? dr : db) : (dg > db ? dg : db);
    if (dist <= NEAR) {
      data[i + 3] = 0;
    } else if (dist < FAR) {
      data[i + 3] = Math.round(((dist - NEAR) / SPAN) * data[i + 3]);
    }
  }
  sctx.putImageData(imageData, 0, 0);

  // Erase the same region from mainCanvas (replace with paper color).
  mainCtx.save();
  mainCtx.beginPath();
  for (let i = 0; i < pathPoints.length; i++) {
    if (i === 0) mainCtx.moveTo(pathPoints[i].x, pathPoints[i].y);
    else          mainCtx.lineTo(pathPoints[i].x, pathPoints[i].y);
  }
  mainCtx.closePath();
  mainCtx.clip();
  mainCtx.fillStyle = PAPER_COLOR;
  mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
  mainCtx.restore();

  redrawDisplay();
  saveCurrentView();

  lassoSelection = {
    canvas: sel, originalX: minX, originalY: minY,
    w, h, tx: 0, ty: 0, sx: 1, sy: 1, rot: 0,
  };
  const overlayCanvas = document.getElementById('sel-canvas');
  overlayCanvas.width = w; overlayCanvas.height = h;
  overlayCanvas.getContext('2d').drawImage(sel, 0, 0);
  applySelectionLayout();
  document.getElementById('selection-overlay').classList.add('active');
  updateLassoToolbar();
}

/* commitSelection — bake the floating selection back into mainCanvas at its
 * current transform. Does NOT push undo (the extract already did). */
async function commitSelection() {
  if (!lassoSelection) return;
  const sel = lassoSelection;
  mainCtx.save();
  const cx = sel.originalX + sel.w / 2 + sel.tx;
  const cy = sel.originalY + sel.h / 2 + sel.ty;
  mainCtx.translate(cx, cy);
  mainCtx.rotate(sel.rot);
  mainCtx.scale(sel.sx, sel.sy);
  mainCtx.drawImage(sel.canvas, -sel.w / 2, -sel.h / 2);
  mainCtx.restore();
  redrawDisplay();
  saveCurrentView();
  document.getElementById('selection-overlay').classList.remove('active');
  lassoSelection = null;
  updateLassoToolbar();
}

/* ----- Lasso path drawing on the canvas ----- */
displayCanvas.addEventListener('pointerdown', e => {
  if (state.tool !== 'lasso') return;
  if (pinching) return;
  if (e.pointerType === 'touch' && supportsPen()) return;
  if (lassoSelection) {
    // Tap-or-drag on canvas while a selection is floating: commit, then start a
    // fresh path with the same gesture.
    commitSelection();
  }
  e.preventDefault();
  lassoActivePtr = e.pointerId;
  displayCanvas.setPointerCapture(e.pointerId);
  lassoPathPoints = [lassoPointFromEvent(e)];
  updateLassoSVG();
});
displayCanvas.addEventListener('pointermove', e => {
  if (state.tool !== 'lasso') return;
  if (lassoActivePtr !== e.pointerId || !lassoPathPoints) return;
  e.preventDefault();
  const events = (typeof e.getCoalescedEvents === 'function') ? e.getCoalescedEvents() : [e];
  for (const ev of events) lassoPathPoints.push(lassoPointFromEvent(ev));
  updateLassoSVG();
});
function lassoPointerEnd(e) {
  if (state.tool !== 'lasso') return;
  if (lassoActivePtr === null || (e && lassoActivePtr !== e.pointerId)) return;
  lassoActivePtr = null;
  const pts = lassoPathPoints;
  lassoPathPoints = null;
  updateLassoSVG();
  if (!pts || pts.length < 4) return;
  extractSelectionFromPath(pts);
}
displayCanvas.addEventListener('pointerup',     lassoPointerEnd);
displayCanvas.addEventListener('pointercancel', lassoPointerEnd);

/* ----- Selection overlay: drag to move ----- */
const selOverlay = document.getElementById('selection-overlay');
selOverlay.addEventListener('pointerdown', e => {
  if (state.tool !== 'lasso' || !lassoSelection) return;
  if (e.target.classList && e.target.classList.contains('sel-handle')) return;
  e.stopPropagation();
  e.preventDefault();
  selOverlay.setPointerCapture(e.pointerId);
  selMoveState = {
    pid: e.pointerId,
    startX: e.clientX, startY: e.clientY,
    startTx: lassoSelection.tx, startTy: lassoSelection.ty,
  };
});
selOverlay.addEventListener('pointermove', e => {
  if (!selMoveState || selMoveState.pid !== e.pointerId) return;
  e.preventDefault();
  const s = frameScreenScale();
  lassoSelection.tx = selMoveState.startTx + (e.clientX - selMoveState.startX) / s;
  lassoSelection.ty = selMoveState.startTy + (e.clientY - selMoveState.startY) / s;
  applySelectionLayout();
});
selOverlay.addEventListener('pointerup', e => {
  if (selMoveState && selMoveState.pid === e.pointerId) {
    try { selOverlay.releasePointerCapture(e.pointerId); } catch (_) {}
    selMoveState = null;
  }
});

/* ----- Corner handles: free non-uniform scale around opposite corner ----- */
for (const corner of ['tl', 'tr', 'bl', 'br']) {
  const el = document.querySelector(`.h-${corner}`);
  el.addEventListener('pointerdown', e => {
    if (!lassoSelection) return;
    e.stopPropagation();
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    const sel = lassoSelection;
    const oppLocal = {
      tl: { x: +sel.w/2, y: +sel.h/2 },
      tr: { x: -sel.w/2, y: +sel.h/2 },
      bl: { x: +sel.w/2, y: -sel.h/2 },
      br: { x: -sel.w/2, y: -sel.h/2 },
    }[corner];
    const cosR = Math.cos(sel.rot), sinR = Math.sin(sel.rot);
    const ox = oppLocal.x * sel.sx, oy = oppLocal.y * sel.sy;
    const oppRotX = ox * cosR - oy * sinR;
    const oppRotY = ox * sinR + oy * cosR;
    const cx = sel.originalX + sel.w/2 + sel.tx;
    const cy = sel.originalY + sel.h/2 + sel.ty;
    selResizeState = {
      pid: e.pointerId,
      fixed: { x: cx + oppRotX, y: cy + oppRotY },
      signX: (corner === 'tl' || corner === 'bl') ? -1 : +1,
      signY: (corner === 'tl' || corner === 'tr') ? -1 : +1,
    };
  });
  el.addEventListener('pointermove', e => {
    if (!selResizeState || selResizeState.pid !== e.pointerId) return;
    e.preventDefault();
    const sel = lassoSelection;
    const finger = screenToCanvasXY(e.clientX, e.clientY);
    const dx = finger.x - selResizeState.fixed.x;
    const dy = finger.y - selResizeState.fixed.y;
    const cN = Math.cos(-sel.rot), sN = Math.sin(-sel.rot);
    const dxL = dx * cN - dy * sN;
    const dyL = dx * sN + dy * cN;
    sel.sx = dxL / (selResizeState.signX * sel.w);
    sel.sy = dyL / (selResizeState.signY * sel.h);
    const newCx = (selResizeState.fixed.x + finger.x) / 2;
    const newCy = (selResizeState.fixed.y + finger.y) / 2;
    sel.tx = newCx - (sel.originalX + sel.w/2);
    sel.ty = newCy - (sel.originalY + sel.h/2);
    applySelectionLayout();
  });
  el.addEventListener('pointerup', e => {
    if (selResizeState && selResizeState.pid === e.pointerId) {
      try { el.releasePointerCapture(e.pointerId); } catch (_) {}
      selResizeState = null;
    }
  });
}

/* ----- Rotation handle ----- */
{
  const rh = document.querySelector('.h-rot');
  rh.addEventListener('pointerdown', e => {
    if (!lassoSelection) return;
    e.stopPropagation();
    e.preventDefault();
    rh.setPointerCapture(e.pointerId);
    const sel = lassoSelection;
    const cx = sel.originalX + sel.w/2 + sel.tx;
    const cy = sel.originalY + sel.h/2 + sel.ty;
    const finger = screenToCanvasXY(e.clientX, e.clientY);
    selRotateState = {
      pid: e.pointerId,
      startAngle: Math.atan2(finger.y - cy, finger.x - cx),
      startRot: sel.rot,
    };
  });
  rh.addEventListener('pointermove', e => {
    if (!selRotateState || selRotateState.pid !== e.pointerId) return;
    e.preventDefault();
    const sel = lassoSelection;
    const cx = sel.originalX + sel.w/2 + sel.tx;
    const cy = sel.originalY + sel.h/2 + sel.ty;
    const finger = screenToCanvasXY(e.clientX, e.clientY);
    const angle = Math.atan2(finger.y - cy, finger.x - cx);
    sel.rot = selRotateState.startRot + (angle - selRotateState.startAngle);
    applySelectionLayout();
  });
  rh.addEventListener('pointerup', e => {
    if (selRotateState && selRotateState.pid === e.pointerId) {
      try { rh.releasePointerCapture(e.pointerId); } catch (_) {}
      selRotateState = null;
    }
  });
}

/* ----- Two-finger pinch on selection: uniform scale + rotate + translate ----- */
selOverlay.addEventListener('touchstart', e => {
  if (!lassoSelection || e.touches.length !== 2) return;
  e.preventDefault();
  e.stopPropagation();
  const t1 = e.touches[0], t2 = e.touches[1];
  selPinchState = {
    startDist:  Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) || 1,
    startAngle: Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX),
    startMidX:  (t1.clientX + t2.clientX) / 2,
    startMidY:  (t1.clientY + t2.clientY) / 2,
    startSx: lassoSelection.sx, startSy: lassoSelection.sy,
    startRot: lassoSelection.rot,
    startTx: lassoSelection.tx, startTy: lassoSelection.ty,
  };
}, { passive: false });
selOverlay.addEventListener('touchmove', e => {
  if (!selPinchState || e.touches.length < 2) return;
  e.preventDefault();
  e.stopPropagation();
  const t1 = e.touches[0], t2 = e.touches[1];
  const dist  = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY) || 1;
  const angle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX);
  const midX  = (t1.clientX + t2.clientX) / 2;
  const midY  = (t1.clientY + t2.clientY) / 2;
  const factor = dist / selPinchState.startDist;
  const dAng   = angle - selPinchState.startAngle;
  const s = frameScreenScale();
  lassoSelection.sx  = selPinchState.startSx * factor;
  lassoSelection.sy  = selPinchState.startSy * factor;
  lassoSelection.rot = selPinchState.startRot + dAng;
  lassoSelection.tx  = selPinchState.startTx + (midX - selPinchState.startMidX) / s;
  lassoSelection.ty  = selPinchState.startTy + (midY - selPinchState.startMidY) / s;
  applySelectionLayout();
}, { passive: false });
selOverlay.addEventListener('touchend', e => {
  if (e.touches.length < 2) selPinchState = null;
});

/* Re-layout when window resizes */
window.addEventListener('resize', () => { if (lassoSelection) applySelectionLayout(); });

/* ============================================================
 * Thumbnails view
 * ============================================================ */
/* ============================================================
 * Thumbnail drawing — drag-to-draw on a thumbnail in gallery view.
 *
 * Lazy canvas allocation: at any time at most one thumbnail has a full-res
 * <canvas> swapped in for its <img>. Switching to a different thumb saves
 * the previous one and converts it back to a static <img>.
 * Pen / mouse drag → draw on that page. Tap (no drag) → navigate to page.
 * Finger touch passes through to scroll if a Pencil has been seen, so the
 * thumb grid still scrolls naturally.
 * ============================================================ */
let activeThumb = null;  // { slot, pageNum, canvas, ctx }

async function activateThumbForDrawing(slot, pageNum) {
  if (activeThumb && activeThumb.slot === slot && activeThumb.pageNum === pageNum) {
    return activeThumb;
  }
  if (activeThumb) await deactivateThumb();
  const b = state.currentBook;
  const c = document.createElement('canvas');
  c.width = b.w; c.height = b.h;
  Object.assign(c.style, {
    width: '100%', height: '100%', display: 'block',
    position: 'absolute', inset: 0, objectFit: 'contain',
    touchAction: 'none',
  });
  const ctx = c.getContext('2d');
  ctx.fillStyle = PAPER_COLOR;
  ctx.fillRect(0, 0, c.width, c.height);
  const blob = await idbGet('pages', `${b.id}-p${pageNum}`);
  if (blob) {
    const bmp = await createImageBitmap(blob);
    ctx.drawImage(bmp, 0, 0);
  }
  // Bake text boxes so the drawing surface matches what the thumb looked like.
  const tbs = (b.textBoxes && b.textBoxes[`p${pageNum}`]) || [];
  for (const tb of tbs) drawTextBoxOnCanvas(ctx, tb);
  // Hide existing children and append canvas as the active drawing surface.
  for (const child of [...slot.children]) child.style.display = 'none';
  slot.appendChild(c);
  activeThumb = { slot, pageNum, canvas: c, ctx };
  return activeThumb;
}

async function deactivateThumb() {
  if (!activeThumb) return;
  const at = activeThumb;
  activeThumb = null;
  // Save canvas back to IDB
  const blob = await new Promise(r => at.canvas.toBlob(r, 'image/png'));
  const b = state.currentBook;
  if (blob && b) {
    await idbPut('pages', `${b.id}-p${at.pageNum}`, blob);
  }
  // Replace the slot's old <img> (if any) with a fresh one from the new blob.
  const oldImg = at.slot.querySelector('img');
  if (blob) {
    const url = URL.createObjectURL(blob);
    if (oldImg) {
      const prevSrc = oldImg.src;
      oldImg.src = url;
      oldImg.style.display = '';
      setTimeout(() => { try { URL.revokeObjectURL(prevSrc); } catch (_) {} }, 500);
    } else {
      const im = new Image();
      Object.assign(im.style, { width: '100%', height: '100%', display: 'block', objectFit: 'contain' });
      im.onload = () => URL.revokeObjectURL(url);
      im.src = url;
      at.slot.appendChild(im);
    }
  }
  // Show any other previously-hidden children (e.g. baked text canvas).
  for (const child of [...at.slot.children]) {
    if (child !== at.canvas && child.style && child.style.display === 'none') {
      child.style.display = '';
    }
  }
  // Remove the active drawing canvas.
  at.canvas.remove();
}

function findThumbSlotAtPoint(pageSlots, clientX, clientY) {
  for (const ps of pageSlots) {
    const r = ps.slot.getBoundingClientRect();
    if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) {
      return ps;
    }
  }
  return null;
}
function thumbCanvasPoint(canvas, clientX, clientY, pressure, pointerType) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (canvas.width  / r.width),
    y: (clientY - r.top)  * (canvas.height / r.height),
    p: (pointerType === 'pen' && pressure > 0) ? pressure : 0.5,
  };
}

function setupThumbCellDrawing(cell, pageSlots) {
  let startInfo = null;
  let mode = 'idle';   // 'idle' | 'maybe' | 'drawing' | 'cancelled'
  let lastPt = null;

  cell.addEventListener('pointerdown', e => {
    if (state.tool !== 'pencil' && state.tool !== 'eraser') return;
    if (e.pointerType === 'touch' && supportsPen()) return;  // finger scrolls
    startInfo = { x: e.clientX, y: e.clientY, pid: e.pointerId, type: e.pointerType, pressure: e.pressure };
    mode = 'maybe';
    cell.setPointerCapture(e.pointerId);
  });

  cell.addEventListener('pointermove', async e => {
    if (!startInfo || startInfo.pid !== e.pointerId) return;
    if (mode === 'maybe') {
      const dist = Math.hypot(e.clientX - startInfo.x, e.clientY - startInfo.y);
      if (dist < 5) return;
      // Promote to drawing
      const ps = findThumbSlotAtPoint(pageSlots, startInfo.x, startInfo.y);
      if (!ps) { mode = 'cancelled'; return; }
      mode = 'drawing';
      const at = await activateThumbForDrawing(ps.slot, ps.pageNum);
      if (!at) { mode = 'cancelled'; return; }
      // Initial dot at the original pointerdown position.
      lastPt = thumbCanvasPoint(at.canvas, startInfo.x, startInfo.y, startInfo.pressure, startInfo.type);
      const tool = state.tool;
      const textured = tool !== 'eraser';
      const color = tool === 'eraser' ? PAPER_COLOR : GREYS[state.greyIdx].hex;
      const base = baseWidthFor(tool);
      const w = pressureWidth(base, lastPt.p) * 0.6;
      if (tool === 'pencil') at.ctx.globalCompositeOperation = 'darken';
      paintDot(at.ctx, lastPt, w, color, textured);
    }
    if (mode !== 'drawing' || !activeThumb) return;
    e.preventDefault();
    const at = activeThumb;
    const tool = state.tool;
    const textured = tool !== 'eraser';
    const color = tool === 'eraser' ? PAPER_COLOR : GREYS[state.greyIdx].hex;
    const base = baseWidthFor(tool);
    const events = (typeof e.getCoalescedEvents === 'function') ? e.getCoalescedEvents() : [e];
    for (const ev of events) {
      const pt = thumbCanvasPoint(at.canvas, ev.clientX, ev.clientY, ev.pressure, ev.pointerType);
      const wA = pressureWidth(base, lastPt.p);
      const wB = pressureWidth(base, pt.p);
      paintSegment(at.ctx, lastPt, pt, wA, wB, color, textured);
      lastPt = pt;
    }
  });

  cell.addEventListener('pointerup', async e => {
    if (!startInfo || startInfo.pid !== e.pointerId) return;
    try { cell.releasePointerCapture(e.pointerId); } catch (_) {}
    const wasDrawing = (mode === 'drawing');
    // CRITICAL: set the click-suppression flag synchronously here, BEFORE any
    // await below. The browser fires `click` immediately after `pointerup`, and
    // if we wait for canvas.toBlob to resolve, the click sneaks through and
    // triggers navigation to the page.
    if (wasDrawing) {
      cell._suppressClick = true;
      setTimeout(() => { cell._suppressClick = false; }, 500);
    }
    startInfo = null;
    mode = 'idle';
    lastPt = null;
    if (wasDrawing && activeThumb) {
      activeThumb.ctx.globalCompositeOperation = 'source-over';
      const at = activeThumb;
      const blob = await new Promise(r => at.canvas.toBlob(r, 'image/png'));
      if (blob) await idbPut('pages', `${state.currentBook.id}-p${at.pageNum}`, blob);
    }
  });
  cell.addEventListener('pointercancel', () => {
    startInfo = null; mode = 'idle'; lastPt = null;
  });
}

async function renderThumbs() {
  // If we're re-rendering, abandon any active thumb (its DOM is about to vanish).
  if (activeThumb) await deactivateThumb();
  const grid = document.getElementById('thumb-grid');
  document.getElementById('thumbs-title-name').textContent = state.currentBook.name;
  document.getElementById('thumbs-title-meta').textContent =
    `· ${state.currentBook.pageCount} pages`;
  grid.innerHTML = '';

  const views = viewsOf(state.currentBook);
  const b = state.currentBook;

  // Auto-fill grid that respects the user-controlled thumbsZoom so + / − /
  // Cmd-scroll changes how many thumbs fit per row.
  applyThumbsZoom();

  for (let i = 0; i < views.length; i++) {
    const v = views[i];
    const cell = document.createElement('button');
    cell.className = 'thumb';

    const img = document.createElement('div');
    img.className = 'thumb-img' + (i === state.currentViewIdx ? ' active-view' : '');
    // Always use spread aspect ratio so a single page renders at the same scale
    // as one panel of a spread (cover sits on the right, back on the left).
    img.style.aspectRatio = `${b.w * 2} / ${b.h}`;

    const isSpread = v.type === 'spread';
    const isCover  = !isSpread && v.pages[0] === 0;

    // Slot order
    const slots = [];
    if (isSpread) {
      slots.push({ kind: 'page', pageNum: v.pages[0] });
      slots.push({ kind: 'page', pageNum: v.pages[1] });
    } else if (isCover) {
      slots.push({ kind: 'spacer' });
      slots.push({ kind: 'page', pageNum: v.pages[0] });
    } else {
      slots.push({ kind: 'page', pageNum: v.pages[0] });
      slots.push({ kind: 'spacer' });
    }

    for (const s of slots) {
      const slot = document.createElement('div');
      slot.style.flex = '1';
      slot.style.position = 'relative';
      if (s.kind === 'page') {
        slot.style.background = PAPER_COLOR;
        const pn = s.pageNum;
        idbGet('pages', `${b.id}-p${pn}`).then(blob => {
          if (blob) {
            const url = URL.createObjectURL(blob);
            const im = new Image();
            im.onload = () => URL.revokeObjectURL(url);
            Object.assign(im.style, { width: '100%', height: '100%', display: 'block', objectFit: 'contain' });
            im.src = url;
            slot.appendChild(im);
          }
          // Bake text boxes for this page on top
          const tbs = (b.textBoxes && b.textBoxes[`p${pn}`]) || [];
          if (tbs.length) {
            const tcanvas = document.createElement('canvas');
            tcanvas.width = b.w; tcanvas.height = b.h;
            const tctx = tcanvas.getContext('2d');
            for (const tb of tbs) drawTextBoxOnCanvas(tctx, tb);
            Object.assign(tcanvas.style, {
              position: 'absolute', inset: 0,
              width: '100%', height: '100%', objectFit: 'contain', pointerEvents: 'none',
            });
            slot.appendChild(tcanvas);
          }
        });
      } else {
        slot.style.background = 'transparent';
      }
      img.appendChild(slot);
    }

    if (isSpread) {
      const gut = document.createElement('div');
      gut.className = 'gutter-line';
      img.appendChild(gut);
    }

    cell.appendChild(img);
    const num = document.createElement('div');
    num.className = 'thumb-num';
    const lbl = counterLabelFor(v, b);
    num.textContent = `${lbl.label} · ${lbl.num}`;
    cell.appendChild(num);

    // Collect page slots so the drag-to-draw handler can find which page the
    // pointer is over (a spread cell has two page slots).
    const pageSlots = [];
    let slotIdx = 0;
    for (const s of slots) {
      const slotEl = img.children[slotIdx++];
      if (s.kind === 'page') pageSlots.push({ slot: slotEl, pageNum: s.pageNum });
    }
    setupThumbCellDrawing(cell, pageSlots);

    cell.onclick = async () => {
      if (cell._suppressClick) return;
      if (activeThumb) await deactivateThumb();
      state.currentViewIdx = i;
      state.currentBook.viewIdx = i;
      await upsertBook(state.currentBook);
      goDraw();
    };
    grid.appendChild(cell);
  }
}

document.getElementById('thumbs-close').onclick = async () => {
  if (activeThumb) await deactivateThumb();
  goDraw();
};

/* Back-to-projects shortcut from thumbnail view. */
document.getElementById('thumbs-back-projects').onclick = async () => {
  if (activeThumb) await deactivateThumb();
  await flushBookSave();
  goProjects();
};

/* Click the book name to rename it inline. */
{
  const nameEl = document.getElementById('thumbs-title-name');
  let originalName = '';
  nameEl.addEventListener('click', () => {
    if (nameEl.contentEditable === 'true') return;
    originalName = nameEl.textContent;
    nameEl.contentEditable = 'true';
    nameEl.focus();
    // Select all
    const r = document.createRange();
    r.selectNodeContents(nameEl);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(r);
  });
  function commitName() {
    if (nameEl.contentEditable !== 'true') return;
    nameEl.contentEditable = 'false';
    const next = nameEl.textContent.trim();
    if (!next) { nameEl.textContent = originalName; return; }
    if (next === originalName) return;
    state.currentBook.name = next;
    upsertBook(state.currentBook).then(() => { /* saved */ });
  }
  nameEl.addEventListener('blur', commitName);
  nameEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
    if (e.key === 'Escape') { nameEl.textContent = originalName; nameEl.blur(); }
  });
}

/* Thumbnail-grid zoom: scale the cells up or down. */
let thumbsZoom = 1;
const THUMBS_ZOOM_MIN = 0.5, THUMBS_ZOOM_MAX = 3;
function applyThumbsZoom() {
  const grid = document.getElementById('thumb-grid');
  // Adjust the column min-size and gap proportionally.
  const baseMin = 220 * thumbsZoom;
  grid.style.gridTemplateColumns = `repeat(auto-fill, minmax(${baseMin}px, 1fr))`;
}
document.getElementById('thumbs-zoom-in').onclick = () => {
  thumbsZoom = Math.min(THUMBS_ZOOM_MAX, thumbsZoom * 1.2);
  applyThumbsZoom();
};
document.getElementById('thumbs-zoom-out').onclick = () => {
  thumbsZoom = Math.max(THUMBS_ZOOM_MIN, thumbsZoom / 1.2);
  applyThumbsZoom();
};
/* Allow scroll-wheel zoom in thumbnail view too. */
document.getElementById('thumbs-view').addEventListener('wheel', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const factor = Math.exp(-e.deltaY * 0.005);
  thumbsZoom = Math.max(THUMBS_ZOOM_MIN, Math.min(THUMBS_ZOOM_MAX, thumbsZoom * factor));
  applyThumbsZoom();
}, { passive: false });

/* ============================================================
 * Export — PDF and ZIP
 * ============================================================ */
function toast(msg, ms = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

async function pageBlobOrPaper(book, n) {
  const blob = await idbGet('pages', `${book.id}-p${n}`);
  if (blob) return blob;
  const c = document.createElement('canvas');
  c.width = book.w; c.height = book.h;
  const cx = c.getContext('2d');
  cx.fillStyle = PAPER_COLOR; cx.fillRect(0, 0, c.width, c.height);
  return canvasToBlob(c);
}
async function loadImageBlob(blob) {
  return await createImageBitmap(blob);
}
function blobToDataURL(blob) {
  return new Promise(res => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.readAsDataURL(blob);
  });
}

/* Render a page's drawing + text boxes onto a fresh canvas at full book resolution. */
async function renderPageBaked(book, pageNum) {
  const c = document.createElement('canvas');
  c.width = book.w; c.height = book.h;
  const cx = c.getContext('2d');
  cx.fillStyle = PAPER_COLOR;
  cx.fillRect(0, 0, c.width, c.height);
  const blob = await idbGet('pages', `${book.id}-p${pageNum}`);
  if (blob) {
    const bmp = await createImageBitmap(blob);
    cx.drawImage(bmp, 0, 0, c.width, c.height);
  }
  const tbs = (book.textBoxes && book.textBoxes[`p${pageNum}`]) || [];
  for (const tb of tbs) drawTextBoxOnCanvas(cx, tb);
  return c;
}
async function pageBlobBaked(book, pageNum) {
  const c = await renderPageBaked(book, pageNum);
  return new Promise(res => c.toBlob(res, 'image/png'));
}

async function exportPDF(book) {
  if (typeof window.jspdf === 'undefined') { toast('PDF library still loading…'); return; }
  toast('Building PDF…', 4000);
  const { jsPDF } = window.jspdf;
  const views = viewsOf(book);
  const doc = new jsPDF({
    orientation: book.w >= book.h ? 'landscape' : 'portrait',
    unit: 'pt', format: [book.w, book.h], compress: true,
  });
  // jsPDF auto-creates one blank page; we'll add fresh pages with correct dims and delete the auto one at the end.
  for (let i = 0; i < views.length; i++) {
    const v = views[i];
    const dims = v.type === 'spread' ? [book.w * 2, book.h] : [book.w, book.h];
    doc.addPage(dims, dims[0] >= dims[1] ? 'landscape' : 'portrait');
    if (v.type === 'single') {
      const blob = await pageBlobBaked(book, v.pages[0]);
      const url  = await blobToDataURL(blob);
      doc.addImage(url, 'PNG', 0, 0, book.w, book.h);
    } else {
      const lblob = await pageBlobBaked(book, v.pages[0]);
      const rblob = await pageBlobBaked(book, v.pages[1]);
      const lurl = await blobToDataURL(lblob);
      const rurl = await blobToDataURL(rblob);
      doc.addImage(lurl, 'PNG', 0, 0, book.w, book.h);
      doc.addImage(rurl, 'PNG', book.w, 0, book.w, book.h);
      // Draw dashed gutter line
      doc.setDrawColor(120);
      doc.setLineDashPattern([8, 6], 0);
      doc.setLineWidth(1);
      doc.line(book.w, 0, book.w, book.h);
    }
  }
  // Remove jsPDF's auto-created blank first page
  doc.deletePage(1);
  doc.save(`${safeName(book.name)}.pdf`);
  toast('PDF saved');
}

async function exportZIP(book) {
  if (typeof JSZip === 'undefined') { toast('Zip library still loading…'); return; }
  toast('Building zip…', 4000);
  const zip = new JSZip();
  for (let i = 0; i < book.pageCount; i++) {
    const blob = await pageBlobBaked(book, i);
    const name = `${pad(i + 1)}.png`;
    zip.file(name, blob);
  }
  const out = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(out);
  const a = document.createElement('a');
  a.href = url; a.download = `${safeName(book.name)}.zip`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Zip saved');
}
function safeName(n) {
  return String(n).replace(/[^\w\-]+/g, '_').replace(/^_+|_+$/g, '') || 'book';
}

/* Project archive — round-trippable .storybook.zip with raw page bitmaps + metadata.
 * Use this to back up, transfer between devices, or preserve text-box editability. */
async function exportProjectArchive(book) {
  if (typeof JSZip === 'undefined') { toast('Archive lib still loading…'); return; }
  toast('Saving project file…', 4000);
  const zip = new JSZip();
  const meta = {
    storybook: 1,
    exportedAt: Date.now(),
    book: {
      name: book.name,
      sizeId: book.sizeId,
      w: book.w, h: book.h,
      pageCount: book.pageCount,
      viewIdx: book.viewIdx || 0,
      textBoxes: book.textBoxes || {},
      createdAt: book.createdAt,
      updatedAt: book.updatedAt,
    },
  };
  zip.file('book.json', JSON.stringify(meta, null, 2));
  for (let i = 0; i < book.pageCount; i++) {
    const blob = await idbGet('pages', `${book.id}-p${i}`);
    if (blob) zip.file(`pages/p${i}.png`, blob);
  }
  const out = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(out);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${safeName(book.name)}.storybook.zip`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Project file saved');
}

async function importProjectArchive(file) {
  if (typeof JSZip === 'undefined') { toast('Archive lib still loading…'); return; }
  toast('Importing project…', 4000);
  try {
    const zip = await JSZip.loadAsync(file);
    const metaFile = zip.file('book.json');
    if (!metaFile) { toast('Not a Storybook archive'); return; }
    const meta = JSON.parse(await metaFile.async('string'));
    const m = meta.book || meta;
    if (!m || !m.w || !m.h || !m.pageCount) { toast('Archive metadata invalid'); return; }
    const id = 'b_' + Date.now();
    const baseName = m.name || 'Imported';
    let name = baseName;
    const existing = await getBooks();
    const used = new Set(existing.map(b => b.name));
    let n = 1;
    while (used.has(name)) { n++; name = `${baseName} ${n}`; }
    const book = {
      id, name,
      sizeId: m.sizeId || 'square',
      w: m.w, h: m.h,
      pageCount: m.pageCount,
      viewIdx: 0,
      textBoxes: m.textBoxes || {},
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };
    await upsertBook(book);
    for (let i = 0; i < m.pageCount; i++) {
      const f = zip.file(`pages/p${i}.png`);
      if (f) {
        const blob = await f.async('blob');
        await idbPut('pages', `${id}-p${i}`, blob);
      }
    }
    state.books = await getBooks();
    if (state.view === 'projects') renderProjects();
    toast(`Imported "${name}"`);
  } catch (err) {
    console.error(err);
    toast('Import failed — bad archive');
  }
}

/* Import button + hidden file input wiring */
document.getElementById('import-project-btn').onclick = () => {
  document.getElementById('import-project-file').click();
};
document.getElementById('import-project-file').addEventListener('change', async (e) => {
  const file = e.target.files && e.target.files[0];
  if (file) await importProjectArchive(file);
  e.target.value = '';
});

 * Boot

(async function init() {
  await migrateV1IfNeeded();
  state.books = await getBooks();
  // Default landing
  if (state.books.length === 0) {
    goSetup();
  } else {
    goProjects();
  }
})();

// Prevent double-tap zoom
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
